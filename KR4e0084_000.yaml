body:
  text: 虛舟集别集類五明提要臣等謹案虛舟集五卷明王稱撰稱字孟揚永福人元潮州總管翰之子翰于明初抗節死稱生甫六齡其母教之讀書以弱冠領鄉薦乞歸養母成祖即位徵至京師授國史院檢討充永樂大典副總裁坐解縉黨下獄死為諸體詩共五卷前有王汝玉序又有解縉序二首一題虛舟集一題其文集而𢎞治六年桑懌序則為袁州守王世英翻刻虛舟集而作不言其别有文集蓋當時已失傳矣集末附續書評及自述誄各一首稱與解縉友善其才氣學問約略相似故縉亦極推許之卒同被讒譖以死然縉詩頗傷剽直若稱之恬和安雅殆為勝之自述稱服羣聖獵百家窮幽明每遇登髙弔古慨然發其悲壯愈樂一寓于文若詩其命意亦殊不茍故集中若感寓諸作規撫拾遺詠史數篇步趨記室將進酒行路難等亦頗出入于太白歌行雖未必盡合古人而一鱗半爪隱現雲端固不止于衣冠優孟也乾隆四十四年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀虛舟集原序立言豈易易哉况聲成文之謂詩詩又言之精者揚子雲曰雕蟲小技壯夫不為誠知言也是故必有超逸絶倫之姿雄渾浩博之氣精深明徹之見源委淵懿之學然後可以挾風騷之體備衆論之長出而鳴一代之盛焉斯豈易易哉三百篇尚矣漢魏以降迄於宋元其間聲律之變雖有不齊而卓然成家者莫不由是不由是者不足以傳之逺也若夫翰林王孟揚者信乎可以繼前人之風相與角立於百代之下者乎孟揚之詩其趣髙其調逸其詞雄其學富出入漢魏盛唐不為近代之語真傑作也抑何由而致是哉余聞培之深者發之茂積之廣者出之沛蓋孟揚幼生閩粵間負英邁之姿席先世之澤閉門讀書逾二十年又閩多君子孟揚得師友之助其所資所養者豐矣比其出遊也觀濤於浙江弔禹功於震澤入京師見都城之雄偉宫闕之壯麗府庫之充實九夷八蠻之會同官翰林耳目所接莫非朝廷之典章一代之制作政教所布號令所施彧彧乎且得屢預國家大事入侍講筵身親禮文之盛及奉命親藩泛洞庭留長沙探古迹於名山川又浮沅湘厯九疑從大將軍觀兵交趾極於南表胸中亦汪洋浩博矣宜其吐為辭章超卓凌轢不自知也昔司馬子長生龍門講道齊魯之鄉東上會稽探禹穴北適燕趙與其豪俊子弟交遊故其文雄深雅健跌宕不羈孰謂孟揚之於詩不由是歟雖然士生幸遇光嶽之氣全則其發於言者敦實渾龎得性情之正豫老而無能為矣繼清廟生民之什以鳴國家之隆者非孟揚誰望焉俾敘其集於是乎書永樂辛卯歲孟春左春坊右贊善兼翰林院編修前修國史吳下王汝玉序永樂初敕修金匱石室之書繼是復有大典之命內外儒臣及四方韋布士集闕下者數千人求其博洽幽明洞貫今古學博而思深如吾太史三山王君孟揚者不一二見然孟揚之為人眼空四海壁立千仞視餘子瑣瑣者不啻卧之地下以是名雖日彰謗亦隨之余每擬薦自代不果且孟揚視功名泊如每有抗浮雲之志期在息機與物無競故其集以虛舟名亦可見其志焉余且第其人品當在蘇長公之列文之竒偉浩瀚亦類至於詩則凌駕漢唐使眉山見之未必不擊節嘆賞思避竈而煬此余之論孟揚者如是他人未必知也孟揚在翰林越三年不欲示其長於人然一遇知已與論古今成敗人物賢否政事得失治道升降則目如曙光辨如懸河真若超千古而立於獨者孟揚固不欲專以文名越石父有言士絀於不知已而伸於知已余其有負於孟揚哉余其有負於孟揚哉握手都門出其集徴豫言遂敬書以復之永樂丁亥春翰林院學士兼春坊大學士國史總裁廬陵解縉書天之文地之文人文與生俱生者也皇太昊之作書契畫竒耦名乾坤别坎離文字著矣黃帝帝放勳帝重華君臣擴而充之爾至素王大備焉六經卓矣後千百年太史遷昌黎伯歐陽公有以窺其藴於是文人之文作焉當其時漢則揚雄班固和之唐栁宗元李翺皇甫湜和之宋蘇軾曽鞏和之繼斯文之作倡以和者夫豈無其人乎今孟揚王君之作其庶幾乎君靈武之世家也其先君守湖州死義於勝國母夫人守節自誓教之其外大父祕書公尤博學知名當時君皆不及事之自知讀書為文兩家善慶所鍾也君生於閩弱冠舉進士來京師陳情歸養太祖髙皇帝憐而許之退而家居定省之暇扁舟載月左右圖書從遊者數人瀹清泉而剝丹荔也人望之如在天表其視區區世俗之淺者為何如哉聖天子龍飛初求斯文之瓌傑近臣爭言君使使聘之至待以殊禮坐之黃閣之下日傳其議衣冠甚偉衆見皆靡又輒自陳願退學校以宏斯文之化即日有詔擢國史院檢討以布衣授是官異數也而君逡巡其間如在髙帝時由其文章足以自娛得乎內者重而待於外者輕自期者甚逺而於斯文亦莫能窺其所至也蓋其新足以濯天下之陳腐其雄足以振末流之頺靡其清足以汰奕世之汚濁其密也足以通羣聖之藴奧貫而一之也洗沃日月若引江海而上之挽河漢而下之霖雨九土也浩乎養氣之盛析理之精充乎宇宙而洽幽明包乎六合之外也其可以世俗之淺淺者觀之哉其可以世俗之淺淺者觀之哉其真有見於素王之卓爾而欲罷不能者歟翰林學士兼左春坊大學士國史總裁廬陵解縉書重刋虛舟集序閩之三山世英王先生初為名進士入翰林為庶吉士授地官主事擢副郎出守袁州以文章學行發為政事其豈弟有循吏之風威重得大臣之體公暇尤留心文事慨其鄉有王君孟揚素以文名當世欲翻刻其虛舟集而乞豫言以辨諸首豫觀孟揚之文上有續書評其文如宜僚弄丸左之而右右之而左皆縱橫如志至如西域神馬過都歷塊微有躑躅之感怨而不怒信能言士哉孟揚在當時名聲藉甚早掇巍科為翰林院檢討入侍經筵及總裁永樂大典同大將軍英國公觀兵交趾而歸竟以非辜囚繫而死夫謗之與譽相為倚伏觀吳下王君汝玉評孟揚詩入陳拾遺李謫仙堂室廬陵解君縉謂其詩凌駕漢唐使眉山見之當避竈而煬凖二子之所言則當時盛譽可知其譽如山則其謗如海孟揚生死榮辱所繫如此且言欲其立不必出諸口行欲其修不必踐諸身此則天下大同之世淳風之散久矣相異則忌相忌則嫉嫉之之深則無所不至焉士君子易處世哉締觀古人逃智以愚去慎為狂以長嘆而了萬變託沈酣以冥萬象雖皆失乎中行原其欲藉是以免世情或可恕也如范滂阮籍之流不失為狂狷之士有道之世成就之拂拭之當有一割之用或退處丘壑友務光而拉支伯亦足成其名於後世何至舉世無所依範任其性之所至而為一偏之歸況使之不得其死耶孟揚臨終有自誄詞一篇與陶淵明秦少遊自挽詩意同得陶之曠達兼秦之悽愴讀之至今使人淚下而不禁昔之置孟揚於死地者今復何在徒足以來千古之唾罵果有賢守如先生者為表章其言以傳不朽者乎君子觀此則知欲有所立不可畏世而不修而世之欲擠君子者計其必馨香於後世凡不究其用與夫不安其生者皆足以為治代治化之纍而已之罪恆不原則亦可以少戒以成身與世之美者矣孟揚父友石山人仕元為總管國朝死節先生并刻其詩亦屬豫為之序𢎞治六年重陽前二日栁州府通判思玄居士東吳桑悅民懌書
