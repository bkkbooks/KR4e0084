body:
  text: 虛舟集巻五明王偁撰七言律詩登無諸釣龍臺懐古髙臺逺枕大江流江上雲屏宿靄收才子揮毫春作賦商人醉酒晚移舟空潭龍去山河改古殿雲寒劒㦸愁莫向此中多感慨漢家陵樹已千秋留别梅溪諸友凉風才動芰荷衣却憶青山賦獨歸近别慈親温省曠乍抛酒伴醉吟稀天邊鴻鴈秋雲薄水面蒹葮夕鳥飛後夜與君相憶處蕭蕭蘿月掩荆扉新築草堂成有述買得幽溪絶世塵林間車馬到無因茅廬新就堪招隠松菊移來散及隣薄暝鳥歸臨水樹傍崖鹿趂採芝人廟堂豈敢干時用但願雲泉了此身草堂與山僧夜坐自牧馬大見過移居深入水南村五桞新栽正對門傍岸春流沿翠篠亂藤棲鳥近黄昏牀頭折簡山人致燈下名香野衲焚童子夜深知客至隔鄰呼取醉芳尊春暮同周元郊行宿烟霞道院時約黄生同奕累月看花奈醉吟不知春樹變鳴禽偶随芳草同閒屐靜拂孤雲響素琴塵世闗情人事少松壇期宿夜燈深明朝入洞觀棊去未許樵夫得見尋晚至鶴林寺問訊山人指白雲數聲烟磬隔溪聞竹房燈靜知僧梵松院苔深見鶴羣聽法夜深山寂寂懶吟衣上月紛紛曉鐘又逐塵縁散此地心期孰與論山中送陳生歸海上洞口花飛春欲䦨玉缸携酒送君還三年厭見天涯月千里歸尋海上山壯志功名看髪變浮雲世事與心閒要知别後相思意萬壑松濤懶閉闗登宿雲臺一逕縁蘿到上方宿雲臺閣樹蒼蒼憑虚目送秋鴻逺向夕忩涵海雨凉童子見人能下拜老僧出定自焚香近來性癖耽禪悦長向空門禮法王寄張員外新年栁色滿都城僊掖朝迴聽早鶯日隠層埤殘雪在香傳别殿曉寒輕瑶池阿母憐方朔漢室公卿羡賈生獨笑長卿淹病久茂陵髙卧有餘情登古囊山辟友岩和瓢所居士之作因寄黄八粲何處秋吟覔逺公蒼苔古道石林東月生雙樹聞虚籟香繞諸天見化宫萬法已超言説外此身多在别離中明朝更冩三生偈去約忘機海上翁中秋與劉大㑹温陵因寄舎弟相逢斗酒粤江濱客裡襟期有故人天上㡬回今夜月此生空笑百年身且須縱醉清尊倒漫説憂時白髪新却憶鴈行同賞處故山回首一霑巾温陵送劉大還三山江流幔曙入河低一尺魚箋醉懶題古道菊花秋草裡敗林莎井露螿啼空林寒影凋芳樹逺澗泉聲下碧溪客路相逢方絶倒馬蹄何事又東西秋日與胡泉州㑹小山叢竹亭分韻得飛字秋風江上早鴻飛桂樹團團影漸稀此日尊前須盡醉古來林下㡬人歸青山烏㡌情何戀翠竹黄花願不違更愛山亭車馬散照人蘿月自依依客清源贈董别駕清時不逐登壇貴瘴海聊因作郡過細桞營中辭虎竹刺桐花底聽絃歌雙旌暇日朋簪盍别駕行春雨露多自是清源山水勝日勤車馬訪烟蘿山中黄博士不至因再約以寄之秋風吹落桂花殘寂寞淮南賦小山自笑草堂魚佩冷空將瑶水鶴書還石門蘿月誰同醉洞口松枝秖獨攀明日角巾能到否呼童竹下掃柴闗春日對酒酬鄭公啟與君相見即相歡况值芳春感二難尊酒且邀花底醉流年不用鏡中看江頭草色侵衣袂雨後鶯聲滿石欄世事悠悠祇如此出門何處可彈冠送人歸任南海一曲長歌梁甫吟百年人事㡬浮沉青雲北上功名薄白首南還嵗月深贈别臨岐思解劒歸來相憶在鳴琴江頭日夜東流水欲識滔滔是此心登九僊山懐林頫因寄雪後空山一棹過新年草色送離歌心知别後登臨少福地重來感慨多谷口飛花看薄暝澗門啼鳥掩埀蘿知君亦有東山屐歸去雲林近若何遊仰山寺優鉢曇花㡬樹開寶坊作禮面如來竹邊野衲叅方至龕裡神僧入定回鹿女獻芝依法苑鴈王銜果繞經臺空門且得休塵累何待人間變刼灰崇川寄懋功張秀才百尺灘頭一訪君碧雲秋靄正紛紛故人已嘆晨星少此㑹翻成落葉分逺樹孤城江上閉晴空踈鴈醉中聞也知西去寧親日還有相思寄斷雲呈芮建安翩翩五馬擁朱轓逺駐旌旗嶺海間不以専城居虎竹誰當西顧慰天顏訟庭落葉知秋早階樹啼烏見吏閒旦晚潁川先奏捷大廷車劍為君頒與夏少府迪話别登薛老峰新秋客裡喜相逢絶頂登臨興不窮逺嶼緑波孤島外亂山黄葉白雲中明朝霄漢應誰共别墅琴尊此㑹同去後重來相憶處短笻吟倚候歸鴻同自牧瓢所宿張氏南樓鳥下平蕪夕靄収偶携江客宿層樓月明清夜聞鴻鴈忩近天河絓斗牛㡬杵鐘聲雲外杳千家曙色暝中浮醉來枕藉秋衿薄疑借僊槎覔逺遊過舊遊有感濕雲如醉䕶輕塵黄蝶東風滿四隣新緑只疑鎖晚黛落紅猶記掩歌唇舞樓春去空殘日月榭香飄不見人欲覔棃雲僊夢逺坐臨芳沼獨傷神秋日懐林源前輩載酒行吟野寺秋青山去後與誰遊懐人獨卧雲中島感興頻登江上樓黄菊久拚陶令醉白頭重抱仲宣愁夜來明月還相照好寄心期到劍州冬日與諸生登天香臺書寄王處士拂曉登臨上翠臺天風吹送逺香來雲空碧海三山小臘盡寒梅一樹開下界人看塵刼外上方鐘斷白雲隈緱山忽憶吹簫侣為冩鸞緘付鶴迴寄自牧時客林王生别館芙蓉秋水漫魚磯白石蒼苔靜掩扉南國懐人成久别茂陵多病有誰依花飛别澗空流水客去髙齋對落暉料得只應賢地主相看未訝故人稀挽石泉藍公前元閩省知事曽將孤憤負當時老判南荒衆豈知王氣已随陵谷改劍歌空對海天悲秋風白髪驚殘夢落日窮泉有所思欲弔𤣥沙孤鶴逺不堪惆悵淚如絲送蔣大尹秋來城下栁條稀祖席官亭醉落暉小邑絃歌千室逺空林悵别㡬人歸舟移越渚清砧候路入吳門驛火微此去料應承寵渥臨岐何必淚霑衣元日早朝鍾山瑞靄曉蒼蒼紫禁猶傳玉漏長雙闕旌旗低鳯輦千官環珮列鴛行恩光已共陽和布草木均霑雨露香獨愧此身無補報年年萬嵗祝堯觴閣中書贈陸員外顒西京冠盖日紛紛那得才華似陸雲北苑停驂時聽漏南宫載筆擅摛文龍旗影度天香近玉佩聲移曙色分獨愧才非枚乘侣也陪霄漢逐鵷羣送卓民逸還越中民逸以善書客翰林者三年至是得請告歸送君尊酒發都亭亭下春深桞色青别思漫縈風裡絮浮生慣學水中萍客程蘭棹天邊逺舊業柴扉海上扄若向山隂逢道士也應為冩換鵞經駕幸大學扈從有作兼似胄監諸博士金輿旦出九重城璧水風雲氣色清千載衣冠尊爼豆萬方禮樂值文明橋門列士瞻天近雲路羣仙捧日行講席更聞敷典誥願將虞夏翊昇平退朝左掖聞鶯追和鄭紀善之作帝城春早覺春和朝罷鶯聲送珮珂文羽不随天仗散調音偏傍上林多嬌連茝石花前聽響雜雲韶栁外過却憶故園芳樹底停盃為爾罷狂歌元夕午門侍宴臘雪霏㣲栁外消天衢香靄逐人飄千門火樹攅珠斗五夜笙歌下碧霄玉醴恩頒春色早金波影浸漏聲遥侍臣湛露將何補願頌康哉答聖堯早朝同員外元賦時有祀事花擁千官刻漏傳蓬萊遥在五雲邊星移北斗當宸極樂動南薫捧帝筵遲日漸晞仙掌露輕風猶裊御爐烟明朝海上祠金馬紫鳯丹書下九天元夕黄庶子淮宅詠蓮花燈和胡學士廣韻剪製芙蕖朶朶新元宵分得玉堂春祗疑金炬來深夜未許青藜繼後塵星萼乍移光滿座月波才動影随人年年此㑹逢佳賞醉落筵前紫綺巾㯶殿成侍宴和趙郎毅之作别殿新開上苑東旌旗遥駐五雲中花深綺席來僊佩香逐金貂引上公自是衣冠逢盛世非闗歌舞樂春風何人賦有凌雲調明日天書許薦雄送曽侍講棨從幸北京羽林仙仗擁皇圻鳯輦時巡出禁闈萬國歌謡歸盛世兩京玉帛望天威相如扈蹕人皆羡賈誼匡時志不違明日甘泉還獻賦㑹令列從有光輝送戴子義之揚州幕府之作二月都門桞未眠行人朝發廣陵船酒酣起舞停鵾奏惜别臨岐贈馬鞭徃事玉簫明月夜江南春雨緑蕪天憑君早慰居民望莫學青樓覔翠鈿晚集黄審理濟池上池上凉風泛夕波筵前紅粉動髙歌朝迴不惜清尊倒醉後從教白髪多寒色又驚秋社燕露香猶送晚空荷歸鞍未許随明月良㑹人生信㡬何送馬進士之姑塾門外驪歌不忍聞城頭落葉正紛紛數尊白下分殘雨一棹青山宿暮雲吳苑砧聲霜後急杜陵秋色鴈邊分朝迴玉珮成行處年少心期獨憶君送文良輔湖廣憲副擢廣東憲使玉節重持出禁闈都門觀餞有光輝三湘曉色随騘馬五嶺春雲上繡衣鳥樹盡随霜後落逺人多在日邊歸㑹看滄海澄清遍一鶚横空似子稀送林叔亮教授四明秦淮斷鴈不堪聞惆悵官亭一送君尊酒暫留吳市月扁舟遥指越溪雲秋來㡬處寒聲早海上千峰秀色分帳下諸生相待久未應寂寞嘆離羣送顯上人還閩中半生踪跡慕雲山結得真僧住世間夜宿孤燈隣妙梵曉隨清磬度禪闗心通萬法縁俱寂目泯空華意自閒此日㣲官牽物累更堪江上送師還寄鳴秋趙山人兼似幻居閒士石橋低覆薜蘿隂澗戸虛窻憶醉吟書寄逺公林下偈調髙中散竹邊琴藥欄春去啼禽換茶竈秋来落葉深别後此情何所似題封一寄故人心送龍河傑首座自五臺歸將赴天台偶逐孤雲下五臺又擕明月上天台衣傳異域曽留偈楓落長江見渡杯上界經行人世别天宫説法夢中廻明朝相憶霞城逺空仰金繩覺路開太常葛寺丞恵菊花賦答重陽陶令嗟無酒笑我霜餘未見花黄菊忽驚移奉禮白衣從遣到隣家寒生客邸秋光滿秀擷踈英舞影斜三逕縱令歸未得也應一粲墜烏紗輓清暉亭林處士芳洲蘭芷正霏霏忽訝中峰隕少㣲雅調何因寄流水孤琴空自掩清暉雨荒脩竹棊聲静塵滿閒床鳥跡稀為問沙頭鷗鷺侣此時誰與更忘機輓林給事中正少年簪筆侍承明誰復才華似賈生零落桂枝天上夢凄凉薤露世間情秋風旅櫬歸何處落日泉扉閉九京欲致生芻陳楚些不堪南望淚霑纓過皖城謁余忠宣祠寂寞孤城野水濆亂餘猶見幾家存女牆日落埋秋草官樹啼烏集暮雲百戰徒聞存國歩孤忠誰復弔英魂夜来遺廟空庭月長悲笳不忍聞登小姑山和何禮部韻宦遊久憶惬登臨此日憑髙快賞心水盡平湖空外落天開絶島望中沉仙人遊珮春雲染神女宫鬟曉霧侵却羡漁舟煙浦笛數聲何處答清吟泛舟漢江示同使何禮部韻郢樹西連鸚鵡洲洲前浩蕩漢江流當年神女曽遺珮此日仙郎更泛舟雨歇鷗鳬屏底見烟光島嶼鏡中浮平生最有滄浪意一曲傳君入棹謳過鐵甕城大江東去浩無窮江上孤城勢最雄天地今逢王業盛山河曽笑霸圖空寒潮落盡春雲白沙鳥飛来夕照紅欲訪遺踪尋海岳月明跨鶴共凌風過昆陵懷浦舎人源昆陵烟樹晚依依短徑行尋到夕暉吟舎空餘秋草没故園時見野禽飛晉宫詞筆應誰繼聖代才名似子稀此日懷君何處冩臨風惟有一沾衣到南湖草堂草堂舊隠白雲邉湖上春風耐醉眠别去松楸頻入夢重来猿鶴又經年移文漫假山靈誚謝病終須聖主憐明發江頭荀御動晚林重鎖緑蘿烟登采石蛾眉亭牛渚磯頭烟水生蛾眉亭下大江横春歸楚樹浮空盡山隠淮雲入望平瓊館有才看倚馬錦袍無夢借飛鯨停橈欲和渝洲曲都付吳歌子夜聲宿巴陵聞笛玉篴飄殘月下聲空江秋入思冥冥怪来楊栁移闗塞可是梅花落洞庭半夜旅魂隨調切誰家少婦倚樓聽曉来更覔龍吟處一㸃君山水靣青幕中贈張郎中共投簪筆出蓬莱萬里従戎亦壯哉閫外論材需豹畧尊前説劍許龍媒中朝人物希先輩午夜文星接上台坐見烽烟銷㓕盡秋風聨轡到雲臺寄郭麾使希武青年建節似君稀千騎轅門擁鐵衣萬里獨留孤劍在三苖已見逺人歸西風暫及黄花醉逺檄時將白羽揮却笑叅軍淹病久未諧清論寸心違九月朔日起覺寒甚誰道炎荒暑氣蒸重陽未到早寒生也知天運隨皇運頓覺南行似北行季子貂裘猶未理楚人騷珮暫辭榮晚来笳鼔城頭急祗有歸心對月明贈閫帥張鎰航海侯之孫將軍簪弁舊名門奕葉曾承雨露恩汗馬樓船成往事玉符金劵至今存節旄正倚雄邉重弓劍休嗟瘴海昏早晚馮唐勞帝想定從白下候歸軒憑祥道中遇元夕有懷曽向蓬莱捧壽觴良宵湛露沐㤙光鳯笙曲奏梨園譜鼇背燈移火樹芳往事别来傷旅恨流年老去在他鄉夷歌蠻舞誰能解馬上看山夜未央與友人詠分得紅葉一片飛来堦下紅滿林驚覺夜霜空緑圭不剪封周弟錦字頻題出漢宫亂撲征衣山徑裏染成秋色夕陽中幾廻記得停車處錯把春華認晚楓詠萍忽見新荷長緑萍恍疑殘雨散銀屏幻身慣舞風前白弱質終浮水靣青斗實當年歌赤日中逵何處覔繁星却慚誰是深根蒂雨約風翻總未停七言絶句懷仙寄上清何尊師崇臺髙映大羅顛三素流雲繞碧天王母不來春又暮洞門閒却古苔編雲母屏風月影孤碧雲琪樹兩三株道童慣識鈞天舞偷向堦前教鶴雛漢苑行羞將團扇泣秋風懶掃蛾眉傍笑叢一自掖庭辭輦罷棃花殘雨鎻深宫露凝仙掌月華清燈暗長門夢不成咫尺昭陽承寵處夜深猶自按歌聲閨思冷落殘筝十指疎良人逺戍近何如樓頭數盡南飛雁不見遼陽一字書山居偶成拂斷紅塵與俗違雲屏幾曲傍深依幽蘭小徑無行跡亂落松花自㸃衣秋山吟望一徑吟秋到石壇烟蘿逺映碧峰寒松邉獨鶴歸来晚贏得閒雲片片看題畫美人八駿瑶池去不迴蛾眉蕭颯鏡中哀至今楚水荒臺上化作行雲夢裏来題張友謙倭扇山水萬里空濛海上山僊人樓閣有誰攀只縁博望星河棹移得蓬莱到世間題畫白翎雀塞花原草度交河往日曽隨鳯輦過一自翠華消息斷空將遺恨寄雲和題米老山水海岳菴前覔舊蹤蒼茫雲樹米南宫别来幾片青山影都付寒鷗一笛風題趙仲穆小景踈烟淡月大堤傍逺樹連墻接水鄉子夜呉歌驚宿鷺風流宛似趙家莊題鵪鶉五陵鞍馬醉芳塵翠袖籠香錦翼馴一自雕屏辭鬬影露苔烟草幾回春為周處士題枯木風摧雨蝕大江濆寂寞盤龍百尺根莫笑支離空老却五陵烟翠幾枝存為林尚黙題新竹粉籜新凋亂玉叢青青已覺萬林空軒廷未製伶倫管翠濕江南烟雨中題畫馬鳯臆龍鬃意氣雄霜蹄蹀躞襯輕風時清不作沙塲夢日日承恩列仗中題林檎山雀圖人間不見函封帖粉墨驚傳落畫屏山鳥飛来林雨後蒼苔啄破子青青題棃花折枝庭院深沉簾幙垂雪香雲影露參差别来環珮春如夢為洗殘粧付阿誰題王孟端畫梧竹洞門一夜起凉颷萬籟無聲聽漸遥記得朝回明月底井梧埤竹共蕭蕭題馬苑小景天際蛾眉淡欲消樓臺染出襯層霄玉簫吹徹鸞飛去人在西湖第幾橋題僧自悦山中白雲度壑穿林元是幻風收雨散却還空要知自悦與持贈都在青天片月中題清源持上人萬壑松濤亭一徑蕭森萬籟寒翠濤烟縠𦕈蒼巒道人夜半經行處悟入聲聞向上闗題畫鶯半窣芳簾醉夢驚數聲拂曙繞花城憑誰借得東風力吹入簫韶雜鳯笙題畫鵪鶉原草飄殘作雪絲日斜馬上鬬歸時五陵别後傷心事零落凉州笛裏吹送僧歸山一錫東歸雪正深孤峰片月助禪心道門亦有叅方者踏遍空花何處尋贈李進士自古鐔津騰寶劍爾家况住湛盧峯盤根此日方看試白日青天見躍龍王奉祠宅餞其伯氏之蜀縣令我家仙令来何處又見雙鳬日下歸明發謝庭看玉樹可憐片月憶光輝都門飲散動行旌千里看花到錦城好借三巴江上水與君流作玉琴聲夜泊潯陽江驛度盡名山問楚湘扁舟此夜泊潯陽琵琶聲斷知何處江水江烟自𦕈茫雨中過洞庭昨夜南風起洞庭曉来湖上雨溟溟忽看天際驚濤白失却君山一㸃青長沙懷古孤城獨上思徘徊何似人間苦棄材寂寞湘南烟雨裡賈生還弔屈生来重登岳陽樓望君山南湖烟水接天流天際青螺掌上浮欲弔湘均何處是不堪重倚岳陽樓常山道中即事前山近曉樹蒼蒼野蕨初抽緑笋長一路春風如有約馬頭吹送落花香提壺聲裡愛山春山色菁葱滿四隣便欲共尋荷芰服却慚簪紱苦縈身黄州夜泊岸籠芳樹水籠煙山月江風共客船半夜洞簫聲起處不知誰是玉堂仙宿鄂渚襧衡洲古白雲低庾亮樓空緑樹齊惟見晚空漁艇火隨風逺過漢陽西陳司馬舟中賞牡丹分韻得歡字折露移雲出楚山錦筵畫舫鏡中看洛陽久負春風約相對無辭盡醉歡黄陵廟芳洲烟草碧萋萋古廟雲深落日低剥盡殘碑無可問春山惟有鷓鴣啼蔚林與陳司馬言别鶴轡嘶風千嶂裏鷁樓衝浪萬灘中暮雲春樹重重見客裏相思更不窮潯州驛客裏潯陽暫泊舟驛樓官樹晚烟稠多情誤作琵琶夢驚覺蠻天瘴雨秋潢州憶丁顯故人自是龍頭客何似南荒久不歸欲把一觴陳楚些月江烟雨正霏霏登月江樓仙人槎浦也朝来一上月江樓江雨長涵瘴水流望斷釣槎人已逺青山㸃㸃是邕州左江錄似友人左江江水日潺湲鳥語沙裳住百蠻莫道天涯應在此交州更隔萬重山交州即事一騎衝嚴到市橋夕陽烟樹草蕭蕭居人猶指髙駢塔碧瓦朱甍尚未凋莫道平居是百蠻烟江花月也同攀一從烽火連天後縦有神珠去不還交州病中録似諸友時軍中絶餉以手帖干主帥索粮問病尋方事總虚漫勞車馬慰躊躇三年玉署蘭臺筆學冩顔公乞米書答謝主帥半欹烏㡌病叅軍萬里従戎未䇿勲不有轅門賢主帥飄零誰與慰殘魂曳裾進作轅門客擁節終慚使者星投李報瓊何日遂空餘豪氣倚青㝠病中懷故山逺向清溪掩石門碧蘿烟帳鶴成羣一從誤作遊仙夢誰管秋山幾片雲裊裊檉隂石徑斜野人迎住近烟霞别来門外滄浪月開遍青松幾度花九日有懷故園松菊應無恙上國新醪也自佳兩地思歸俱未得一身長笑在天涯九日黄司空招飲不赴書以答之菊觴萸豆有佳期客裏逢迎慰所思不是叅軍招不赴病来烏帽未勝吹為馮叅議貴題畫風竹馮沅湘人曽為給事中移得孤根過洞庭禁埤曽送珮珂聲如今座上凉颷滿一掃炎荒瘴雨清寄莫叅政時在寶陸破賊九月西風太白髙笑麾白羽氣偏豪明朝掃振轅門捷凖擬盧江倒濁醪送趙侍郎毅還京富春江畔草萋萋旌斾如雲鐵馬嘶帳下為君斟别酒京華歸夢使人迷晚眺鬱孤臺百尺髙臺却暮寒虎頭城枕碧雲端縈迴二水蒼龍合流下前溪十八灘雨中登快閣寄畦樂處士江風吹雨晚霏霏江上孤鴻濕倦飛欲向滄波期釣侣清時未許著荷衣江上見酴醿分得人字向来同醉帝城春馬首東風落絳茵玉架錦屏消息斷只今誰是冶遊人閲兵呈總戎時積雨大霽青天昨夜將星明際曉風雲氣色清試向閲兵臺上望豺狼何處敢横行將臺髙築颭旌旗百萬貔貅試閲時上下風雲同一色天心元與將心期凱歌四首大將南征討不庭節旄萬里耀威靈轅門五夜狼星墮直挽天河洗甲兵萬里炎荒貼海平腥波千尺舞長鯨王師百萬従天下瘴雨蠻烟一霎清瘴海樓船一夕過瀘江鐵騎曉鳴珂皇家飛將功成日不數當年馬伏波熠熠參旗䕶陣門喧闐鼔角擁回軍當年麟閣休專美此日雲臺更䇿勲又四首六龍曉駕出居庸萬里沙塲一掃空無限山川歸奏凱一時天地為昭融旗翻魚海三秋雪馬躞狼居萬里氷五夜旄頭横陣落六師齊和凱歌聲燕支山下起秋風飲馬河邊日射虹従此玉門開不閉欣逢南北一家同六符同覩泰堦懸壯士長歌北到天萬國衣冠陳玉帛兩京日月照山川七言排律暮雲春樹送張謙岐路逢君賦逺遊傷心雲樹粤江頭輕隂向夕花前度秀色將春雨外浮却訝梁園看漸杳恍疑巫峡散還收白衣靄靄迷征斾翠幄籠籠引去舟惜别不縁今日賦髙情那記昔人留遥連蜃氣江東暝逈帶猿聲渭北愁夢覺㣲茫沙上驛醉来掩映水邊樓宦情已共青霄永别思空隨緑水流若到上林成五色好分餘䕃及南州南宫呈大宗伯東壁文章映列曹南宫冠盖富英髦名埀霄漢當時重身接風雲盛世遭花引爐香聞整珮風移扇影見揮毫蓬莱宴罷春雲集鴳鵲朝回朔雪髙坐客盡擕毛遂頴故人曽贈吕䖍刀獨憐璧海才華地久逐詞林姓字叨已覩重光歌舜禹更期獨歩訪䕫臯天瓢若借恩波及未必臨風嘆二毛醴泉應制時有禧事青禽白鶴先集慶雲甘露降寶筵初建曉蒼蒼大駕躬臨禮玉皇白鶴青鸞昭孝感慶雲甘露兆佳祥更傳聖水符前代忽訝靈源湧上方玉竇泛春時脈脈金罍貯月乍泱泱薦来只擬羞萍實挹處渾疑剖蜜房𤣥酒奠壇同瑩徹黄流在􅕌等芬芳漫誇沆瀣移仙掌迥謝蒲萄入醉鄉瓊液久䟽神島瀝瑶池曽引帝臺漿中元表異還超漢貞觀論功逺邁唐妙絶醍醐班十瑞𠻳餘雲母已千霜冰壺瀉罷同欣忭天乳霑廻等壽康自媿涓㣲無補報祗應上祝紫霞觴寄題張真人耆山精舎旭日初霞晃翠屏琅玕芝草近珠庭玉簫吹徹鸞初下丹液凝成鼎自扃海濶傳緘曽命鶴夜深飛佩欲騎星洞中石􅔱移仙乳雲際松根長茯苓象朱旙朝太乙寶函金訣授𤣥經凡情久斷懸應解塵刧都忘慮已𡨕却笑蜉蝣同草露也應歳月羡椿齡何由共把浮丘袂指㸃三山掌上青贈馮叅議貴馮以給事中從軍交阯擢任其職平蕪古堞晚蕭蕭秋盡炎荒草不凋北望休嗟邉徼逺南来已見瘴烟消受恩部節分清要託顧專城協上寮海國諸生多在席中朝老將半迴貂文雄慣草軍門檄地僻曽迂使者軺萬里正看摶羽翼一枝従此詫鷦鷯座中論侠心逾壯幕下延材氣不驕㑹見徴書還賈誼未應投筆羡班超愧余感遇情初洽念爾相逢意獨饒孤館療除頻見過遐方溽暑不辭歊呼童日午尋茶臼隔壁時来問醴瓢正喜詞華泉倒峡俄驚歳月斗旋杓星河耿耿當窻見島樹依依入望遥一曲劍歌何處冩不堪聽盡海門潮南海劉閫帥席間有成雨収雲散海天空萬里相逢興不窮畫㦸轅門閒夜月髙堂粉署坐薫風也知弓劍長懸久且仗壺觴宴坐同櫪馬亂嘶邀上客佩魚初妥列羣公芳尊瓊醴蒲萄色錦席雕盤荔子紅作客久經南瘴逺當筵偏激劍歌雄玉繩低繞雙星外銀甲移来一笑中醉後忽思驃騎幕燈前含笑看吳鴻續書評附盖聞規矩方圓之至聖人以體天地之撰以類萬物之情故竒圓而偶方轉筆為圓摺筆為方方之平為凖圓之直為繩隂陽五行所以成象成形也書以方圓平直為之主而輕重大小低昻長短邪正寓其變焉上字之於下字左行之於右行横邪踈宻各有攸當所謂増一分則太長虧一分則太短魚翼鳥翅花鬚葉芒油然粲然各止其所上下連延左右顧矚意象森嚴血脈生動縱横曲折無不如意毫髪之間直無遺憾其四靣八方巧於善陣所謂紛紛紜紜鬬亂而不亂渾渾沌沌形圓而不可破豈足喻其妙哉必其一字之間自應絜矩一篇之中可無絜矩之道乎故右軍書古本最善行列近世惟趙吳興深得其㫖然就一篇之中固皆欲佳必有數字登峰造極者為之王一字之中雖皆欲善必有一㸃一鉤一披一拂主之如兵之有將石之有玉使人玩繹不可名言若握筆則虚圓正𦂳四字盡之其餘以意變通則壓捺鉤掲抵拒遒逸其説益宻矣至於用筆之功鋒芒毫釐之間正用之側用之偏用之批答用之背向用之承覆用之傲讓用之低昻用之長短用之逆而順之下而上之襲而掩之空中擲之架空搶之窮深掣之頓挫之鬱屈之周而折之抑而揚之藏而出之埀而縮之往而復之盤旋之踴躍之瀝之使之入衂之使之凝築之如穿按之如掃注之趯之指之擢之揮之掉之提之拂之収而縱之蟄而伸之淋之浸淫之使之茂巻之蹙之雕而琢之使之宻覆之削之使之瑩鼔之舞之使之竒喜而舒之如見佳麗如逺行客過故鄉發其怡怒而激之如撫劍操戈介萬騎而馳之發其壯哀而思也低回聚促登髙弔古慨然而發其悲樂而融之如夢華胥之遊聽鈞天之樂與其簞瓢而樂之也忘情筆硯之間和調心手之用不知物我之有間體合造化而生成之也而後為能書之至爾自述誄王偁字孟揚其先東阿人宋寶元康定用兵西方士有没於吳昊者王氏遂為西方人元有天下其地最後附賜姓唐古氏髙祖王父某従下江淮授武德將軍總管鎮廬州曽祖王父某祖王父某相繼襲爵改上千戸没俱葬大蜀山下先府君某當搶攘以材用薦者調民職廬州路治中厯江南福建行省郎中至階朝列大夫潮州路總管當時稱㢘吏第一人所蒞政績卓異字惠小民攘剔豪右禮賢士植綱紀民奉以祠元運改玉度時不可為浮海去之道閩閩父老遮留退居永福山中為黄冠服者十年朝廷聘之恥為二姓臣遂自引决嗚呼是時偁方生九齡家觳然壁立太夫人守節自誓艱難備嘗手疏先君之蹟與古今豪傑大畧教之外王父姓劉氏諱某由宣文閣博士出簽閩憲再召入為秘書丞没王事贈嘉議大夫福建行省叅知政事淹貫靡不䆒博古好雅翰墨之妙絶當世偁不及見之閩先生聞過齋吳公學行醇偉為士林望與先君交誼相與也先君没時屬偁夫子教之苐未弱冠夫子没倀倀罔依歸賴外王父遺圖書手澤多杜門自研淈少多病負第者三年莫臻其至弱冠入庠序與陳君從範遊陳蚤入聞過夫子室獲其指授懇懇汰其瑕礫示以瑜瑾一旦斯發蔀矣洪武庚午賔興歳領薦方去海濵觀光上國㑹試禮部不利例入國子處縉雲朱先生館下日求齊魯士與談訪其遺風及四方之賢者而私淑之上表陳情乞終養髙帝憫之南歸越震澤徘徊吳㑹間不敢留趨侍湯藥膝下始冀收其實而從範已物故閩故老亦凋剥殆盡四涕毗落無可與語晚得晉昌林誌相與論學假以模範抗顔為多暇則窮幽極深徜徉物表趣豁如也未幾太夫人捐館舎嗚呼居䘮不敢渝禮既合先君塋廬墓下者六年永樂初元以推轂者至京師待命黄閣因自陳願處學校勵人材不允授従事郎史官翰林檢討進講經筵以文字供職時錢塘王洪擅詞垣與同官一見過相推重勅修大典萃内外儒臣及四方韋布士毋慮數千人濫竽總裁之列大將軍英公覆征交阯辟居幕下於是泛洞庭浮沅湘厯九疑弔蒼梧徴兵南海既而窮象桂道五管觀師於日南九真之交時有贊勴大將軍待以為揖客歸仍守其舊官先娶鄭氏新安人前名御史潛之孫女先卒再娶薛氏閩故族孝養於姑貞淑内得其亮生男一人振女子某一人其次男拱女子某一人側室李氏出也此族系出處之概少鋭志於有為毅乎思凖古以馭今而用弗以施學雖服羣聖獵百家窮幽明亟於聞道而質淪惷杌遇登髙弔古慨然發其悲壯愉樂一寓於文若詩而辭媿土苴其為人則似戅而容似傲而恭家貧而心樂身困而處裕然疾惡太過遇權貴不能俯首下之任情以直不能骩以徇人成功此其見短於世也見人善不啻若已有之雖匹夫問未嘗不竭以盡與人交内外不敢携此則自以為長焉若夫倇以為終身之憾者齓失所怙哭吾父幾不能生初知學而哭吾師如哭吾之父焉未幾哭吾友如哭吾之師比得祿而太夫人不逮養有子教之未立荷兩朝之恩而莫一舉報嗚呼况兹身繫絏縲西山東陵淆而未分孤臣之號庶女之慟南音之戚梁岸之章孰為發之日者以支幹推定人禍福生死謂吾年日皆庚廸於丙歳在閼逢麗於鶉火其弗延矣嗚呼其果然耶孟子曰桎梏死者非正命也晝夜之理吾曷念之因述其系而極之以呼天之辭用自誄俾後之為烏鳬為螻螘在陽侯在回祿或返其遺骸而招其魂魄或藏其衣冠庶令有考者憫其志而哀之焉辭曰予概觀古之人怙材者恒困於弗施志大者惟顛頓之屢躋嗚呼孟揚矧爾乏古之才而尚其志焉得不竒於時而諉於戾爾負而君爾負而親嗚呼誰其白之悠悠蒼天虛舟集巻五
