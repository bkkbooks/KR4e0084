body:
  text: 虛舟集卷四明王稱撰五言排律山居約馬自牧同隱卜築逺囂塵松泉落澗濱山雲常共醉海月不羞貧看竹琴留客尋芝鹿傍人露巾裁落芰野飯薦香芹樹變啼園鳥溪遊縱壑鱗蕙牀眠薄暝桂酒賞芳春入社髙僧共尋山短屐頻市城能掃迹遲爾結為鄰夏日同吕民部宴臺山閣書贈邑令沈丙林吹繞橫塘山亭挹衆芳琴尊延勝引環佩集仙郎髙詠揮瓊麈飛泉激羽觴葛輕衣入暑玉冷簟浮湘鳯渺辭丹掖鸞緘貯縹囊羣峰屏遍列一水鏡牽長寶瑟頻調柱清歌逈繞梁澗花開互對山鳥下成行已判徵仙事還疑到醉鄉染塵慚汨沒畢景恣徜徉桂域流初魄松梢促晚凉幽期殊未已書此報河陽贈童將軍聖德埀文統開疆仗武臣熊羆偏兆渭嵩嶽再生申控節三邊靜謳歌萬國春䇿勳來汗馬剖劵寄雄闉何處推名閥淮陽識異人起家龍劔舊錫命虎符新略地功名在専城寵渥臻朔方推鄧禹南土戴曹彬事業誰能擬賢郎更絶倫鳯毛看鸑鷟驥種得麒麟勇略仍無匹雄韜動有神聲名傳此日光彩擅常陳閫外今無事邊陲早控塵轆轤閒夜月睥睨倚秋旻國士延毛遂華筵召郤詵五羊流美頌百粵仰深仁自笑飄蓬客難同入幕賓轅門叨接猛斗篆未誇秦王粲登樓處相如作賦晨不因知己戀誰作浪遊身伏櫪心猶壯攣鞲氣未馴素書如可試黃石舊為鄰寶珠蘭若萬花明晚嶂一徑靄天香問法逢龍勝尋山到鴈堂梵輪標月相石鏡讓珠光野興看雲逸松泉捲幔凉洗心依覺苑作禮面空王初地超凡品泠然萬慮忘蔣山法㑹瑞應詩應制作寶地奉金仙璇宫啓梵筵真僧騰異域開士唱三緣說法雲成蓋談經花雨天祥光凝彩絢甘露㵼珠圓天樂慿虛下神燈徹夜懸勝因濟妙筏覺路指迷川秪樹春光溢靈山㑹儼然願茲宏至化皇運共千年白鹿應制樂囿歌周室呈祥出漢圻神胚金育秀瑞采玉為姿顧兔寧堪匹祥烏未足竒露毛偏濯濯霜角自離離漫㸃蒼崖雪曽銜紫嶺芝來依琪苑靜馴傍玉階宜海嶠遺仙跡窮荒貢赤墀何如昭景貺重覩聖明時送人戍邊玉勒浮雲騎雕鞬明月弓日邊辭帝輦天際逐沙蓬百戰兵符動三門將略雄戈矛明積雪旌斾疊髙風朔漠窮隂外幽關落照中壯懷何以贈劍氣欲吹虹挽林思和校文冠冕長林後詩書百粵尊九侯傳世澤雙闕表名門學海文風盛黌宫教雨存朋簪方濟濟逝水竟沄沄寂寞餘詩社飄零散酒樽琴書徒爾恨鐘鼎更誰論夜月看歸鶴秋猿伴旅魂園林荒竹樹風雨敗蘭蓀走訃驚千里悲歌向九原猶疑騎列宿箕尾不堪捫題天台梁氏聚青山房絶巘鄰滄島中峰接上台林間别阜出忩外聚青來選勝宜招隱棲幽異鑿坯白雲華頂鶴瀑布石屏雷羽客停鸞吹仙人共酒杯烟霞林鹿伴冠蓋嶺猿猜自笑羈塵內何由避俗媒慿題紫芝曲寄謝赤城隈題嘉禾楊郡守緑野亭南藩開别邸五馬駐仙軿地接三吳壯山連百粵青簪纓延上客詩酒聚文星妬舞花當户傳歌鳥近屏園丁供核篚野老獻茶經架展黃封軸門題墨客銘白雲隨捲幔華月似窺櫺雅趣林泉洽幽懷海嶽冥徐生髙士宅揚子草𤣥亭未足同風調徒應襲露螢須知潁川政鳴鳯下郊坰呈陳司馬大將分雄閫名卿出上台六韜資廟略萬里掃炎埃鐵騎如雲集樓船際曉開月將弓影滿霜逐劍鋒摧寵賚當陽節人憐定逺材指麾停羽箑談笑許龍媒銅柱功寧羡金臺志不回豈伊専鉞斧更爾賴鹽梅自笑疲駑甚聊因附驥來未攜孫楚䇿屢接禰衡杯汲引寧忘自吹噓幸見陪酬恩看玉劍千里動風雷環璧軒為劉僉憲題憲節依南紀開軒得最幽引泉窺蜃胍鑿地應龜謀團魄疑初墮輪光訝未收不隨方沼合宜傍月江流荷蓋侵書幌芹香㸃客裘漫同瞻泮水非是奠圓丘蒲榖生當異琮璜勢欲侔奎文時貫户雲漢半藏陬色媚沉珠浦輝聨釣玉洲探源窮妙理觀化仰前修映采回軺鷺忘機狎野鷗鑑容堪整佩濯足詫埀鈎檻俯花如笑橋成木自樛燕衝飛絮入魚噞亂萍浮潤溥臺前柏聲諧阼外璆瑩深瑕不染光重價難酬才子誇神遇羣公事勝遊賦詩偕酌泂載酒擬消愁凉思通規牖清源得上遊懸車曽有約揮棹倚髙秋游海珠寺示同遊文憲使周僉憲絶島波心見棲身玉鏡中欲觀鼇背日還仗鷁樓風客思員壺外雲程若木東蜃光晴作霧海氣晝成虹僧剎蛟龍護神珠水月通同遊多逸侣歸棹擬乘空五言律詩塞上曲飛雪逈千里春來草不生曉辭驃騎幕夜薄左賢營性命酬恩寵心魂戀苦旌誰知麟閣上青簡貯芳名其二中夜旄頭躍將軍逺戍邊磧昏旗影暗水滑馬蹄穿劍拂秋霜冷弓彎塞月圓直須清大漠萬里勒燕然其三代馬風雲色吳駒霜雪明三邊傳警候萬里事橫行擬促隂山騎遙連瀚海兵願開沙漠北持答泰階平其四逺戍金微道一上單于臺關門秋色斷羌笛夜聲哀少婦龍沙夢長安鶴使回祇今青海月流影碧天來隴頭水隴底望秦關蕭蕭隴水寒照人猶帶恨飲馬不成湍落日邊塵合秋風候騎殘誰磨三尺劍直為斬樓蘭楊桞枝春光曉漸饒楊桞暗宫橋嫩葉凝愁黛纎枝倦舞腰祗應悲戍那解綰蘭橈更待花如霰紅顏為爾凋梅花落青樓嘆落梅獨起自徘徊帶雪粘歌扇因風上鏡臺晚糚誰更㸃邊角正堪哀望斷尋香徑依依滿緑苔小埀手秦女騁妖嬈春風步翠翹只疑花作臉更訝桞為腰燭暗花鈿墮風輕羅帶飄自矜纎弱態不羡掌中嬌巫山髙巫山不可望望極使人悲樹暗啼猿峽雲空神女祠秋聲留别恨夜月悵佳期欲問髙唐事惟應宋玉知入西山訪張隱士兩岸噴飛瀑結屋烟蘿裡山人不冠屨客至同隱几獨鶴海上歸孤雲澗中起淨掃白石牀風來墮松子晚歸湖上一徑愜幽尋悠然世外心不緣流水泛那識落花深潭影澄天鏡松聲韻素琴前林烟磬發歸晚月沉沉偶行山中得清冷泉萬籟曉俱寂風泉有逺音偶隨清嶂去因到白雲深噴薄疑飛雪冷清可照心坐來天影淡一曲韻瑶琴山寺尋僧尋山憶慧能問偈遇真僧竹覆山門雪花藏古殿燈千家供法食一衲絓踈藤不是遺經呪多應悟上乘尋鄭道士坐清暉閣吟秋入翠微髙閣坐清暉鴻寶傳真訣清齊話息機澗雲生野屐山雨拂塵衣自是支離久依方早有歸憶陳升京國一為别橋門十載春虀鹽朝共飯風雨夜連茵玉樹誰先折泉臺竟不晨空將知己淚西望灑風塵過董江臺懷從範陳君才八斗何謝建安人不折月中桂誰憐泉下身髙臺枕流水故業委荒蓁忽聽山陽笛凄清滿四鄰送夏廷簡宿怡山蘭若别路繞珠林秋來落葉深一燈今夜雨千里故人心已覺空門幻還驚旅况侵坐聞鐘鼓曙離思轉沉沉陸氏山池淡淡牽銀藻娟娟種玉蓮誰聞照膽鏡中有洗心泉萍散山流影雲收月墮天願隨鷗鷺侣薄暮宿寒烟送黃尊師歸華山我送金華子西歸玉女峰瑶笙飛一鶴寶劍佩雙龍人問丹砂訣天清碧澗鐘遙知騎白鹿韓衆定相逢送人以故將召用秋風大道傍立馬盡餘觴興逐孤雲逺情隨去路長亷頗思趙士漢主憶馮唐莫奏桓伊笛蕭條兩鬢霜楊秀才幽居楊子幽居處開忩面逺空水喧明鏡裡雲落畫屛中捲幔留山月揮絃送晚鴻何人問竒字載酒野橋東白雲寺贈僧道林說法處應在白雲邊宴坐度小劫冥觀入大千諸天花雨遍雙樹慧燈懸何日東林社相期種白蓮詠毛女拂黛逃秦苑羞蟬入漢年羽毛滋異藥山谷遇真仙夜月思金屋春風潄玉泉折花壽王母嬴女解相憐詠西施浣紗白石上本住越溪濱一入吳王苑遂為傾國人春華嬌艷質秋水助精神寄謝東鄰女雙蛾莫效顰朝退懷南湖草堂寄舍弟及舊社諸游好朝回獨掩扉髙卧息塵機春色如憐客飛花故㸃衣雁行驚别久鶴病憶羣稀何日南湖上春雲滿棹歸題金道士丹室石洞掃烟霞仙壇覆落花人間尋鶴侣天上駐鸞車瑶圃桃成實金盤棗似瓜待豫休物纍從爾問丹砂立春早朝賜酺答鄭編修之作玉厯新頒後千門曉色鮮青雲干舜呂和氣入堯年髙品初傳敕中庖預列筵愧非枚乘侶雨露沐恩偏大祀候蹕有成天上開黃道雲間落鳯韶侍臣瞻豹尾列從護雞翹羡錫皇心豫春回瑞靄飄萬方霑雨露鼓舞頌軒堯贈羽林翟大十二羽林郎星文映上蒼承恩當列仗走馬出長楊夜宿平康里春遊俠客場袖中徐匕首萬里報君王閣下贈同官王洪王子才無敵冰壺映世稀賦成金韻逺詩奪錦袍歸入侍趍丹禁承恩拜瑣闈茂陵慙久病因欲解朝衣其二日射黃金闕春回白玉堂地分清切處人在碧雲鄉彩筆傳天語宫袍染露香明朝還獻賦遲爾沐恩光寄茅山道士天轉招搖近山藏句曲深龍歸丹井暗松覆碧壇隂賣藥留金訣看雲抱玉琴夜來笙鶴下相應步虛吟和王舜舉春日襄陽之作因送之歸漢水千年緑襄陽二月時人歌大堤曲春到習家池且縱山公醉寧同叔子悲葛疆今已老歸馬莫教遲賦得邊城雪送行人胡敬使靈武萬里燉煌道三春雪未晴送君走馬去遙似踏花行度蹟迷沙逺臨關訝月明故鄉飛鴈絶相送若為情賦得驄馬送黃采巡按北京兼寄蕭福王選二豸史錦勒玉花驄長鳴向北風已看千里去坐覺萬羣空噴玉燕山逺鳴鑾薊水通使君同攬轡早晚奏竒功贈御醫蔣彥文昔年遊海上晚嵗住京華肘祕盤囊訣爐存伏火砂進方親御扆種藥借鄰家欲問廬山杏年來幾度花挽周員外元早嵗擅芳名中年一宦成鶯花平日淚烟月故山情落魄嵇中散猖狂阮步兵可憐埋玉處芳草傍誰生送李校尉致仕還江左雄劔委龍鳴關河白髮生功成百戰後老去一身輕夜月桓伊笛秋風驃騎營燕歌何處寫曲罷有餘情送趙友同還華亭時水泛三吳積水渺無際送君江上還九峰何處所迢遞白雲間舊業菱荷在秋風鷗鷺閒定知三泖月相見一開顔送人之昆陵興盡一杯酒相看欲别時孤帆乘吹發一鴈度江遲千古蘭陵令秋風季子祠勝遊多感慨為爾寄遐思書懷寄友人還建安游乏金張援官無子孟資庖人羞獨割尸祝漫相知此夜金陵月明朝瓊樹枝武夷山水郡相憶在題詩送友游吳適越斗酒興不淺南遊幾日回擔囊無俗物訪古及吳臺腰下延陵劔手中張翰杯若逢梅福問相與上天台送平直之沔陽學正楚澤三秋近荆門一望開沔流緣泮入巫樹擁屏來共訝平當老誰憐宋玉才鳯歌時有客狂狷待君裁舟中贈司馬秀才才子茂陵客何年賦逺遊家藏封禪草身著鷫鸘裘未贈王祥劍先同郭泰舟明朝霄漢上一鶚看橫秋贈妓白雪調歌曲芳蘭託慧心舞回香影亂笑掩黛㾗深夜月牽情夢秋鴻覔斷音江舟司馬淚曽為一霑襟其二竹枝歌送君錦瑟不堪聞欲識芳心恨愁將寶帶分碧峰留黛墨秋水學湘裙明日陽臺上空瞻一段雲分題賦得白櫻桃嫩葉雕輕翠新葩倚淡粧鳥來雲度影人靜月籠香未擬收珠實先應倒玉觴綸巾才欲岸微墜露華凉賦得花影欲拂更紛紛空香寂不聞亂迷芳蝶夢輕護錦苔紋襯月籠書幌因風揚舞裙莫移庭下步蹴碎一階雲送人之蜀郡守聞道蠶叢國西連漢隴平三年懷紫䄂萬里慰蒼生夜月巴川靜秋風錦水清請看霜鍔試莫使雪山傾渡揚子江四月驚濤白扁舟發大江不因臨絶險那使壯心降天際羣峰碧磯頭白馬雙勝遊殊未已聊爾駐麾幢嶽陽送同官王洪中書舍人吳均入蜀五月不可觸三巴未易行共因嚴使命同此念王程月下猿聲斷雲中鳥道橫明朝相憶處夢繞錦官成嚴州江上短棹蕩江春春風物侯新岸花飛送酒沙鳥近窺人碧樹籠青嶂芳洲㸃緑蘋因悲城市裡日日醉車塵其二嚴子投竿處春來載酒過潮聲通越近山色入吳多沙際舟如月雲邊鳥似歌客程隨去住那許嘆風波西山訪李徵士夜歸山翠雲邊墮溪聲竹外虛尋秋窮謝屐隔水訪陶居鄰嫗供新醖家童剪夜蔬醉歸蘿蓽底殘月在襟裾别宗上人孤琴宿白枌一錫喜逢君只為談鋒妙因悲染世氛窮秋燈影靚殘月梵聲聞明發身無住空山又斷雲舟中望九華雲錦積岧嶤屏風倚碧霄猿聲聽不盡山翠望還消俗駕何由稅仙人不可招夜深理孤棹乘月逐歸潮送孤處士歸四明聞說四明路迢迢隔剡溪天連滄海闊樹擁白雲低山憶謝公詠人宜賀監栖送君從此去欲使宦情迷除夕殘雪初消夜陽光已報春客懷誰共慰孤燭自相親寂寞烟霞夢飄颻霄漢身君恩何以報來日嵗華新送沙子進赴祿州别駕客舍酒初香都門桞色黃一官仍别駕萬里赴炎荒江路猿聲早山城榕葉凉逺人勞撫字且勿厭殊方送人令南海二月都門桞那堪綰别離雙鳬舞日下匹馬到天涯海氣滄溟夕山郵瘴雨時惟應南海月千里照相思平樂溪巾一水縈銀練亂山攢劍鋒誰家孤嶼火落日古城鐘衰病易為感韶華何處逢平生慕幽寂對此太愁濃五羊城遇張順論舊有懷匹馬到炎荒逢君鬢已蒼邑人傳左語官樹隱殊鄉感舊看長劒緘情憶縹囊明朝愁又别天海共茫茫其二握手京華道相看又幾年宦情從淡泊鄉思共依然滄海浮空逺孤城落日邊斗槎如可借同覔閬壺仙雍州五管推名郡雙江接上游人家蠻洞曉山雨瘴烟浮逺客誰青眼殊方易白頭夜來南極上分野望牽牛舟中懷彭詡逺漢落星稀踈林驛火微已知去國逺况與故人違旅夢驚殘葉凉聲到客衣何時聨畫舫同望楚雲歸與張從事夜坐幕府有贈亞夫登上將劇孟在軍中敵國真堪倚雄姿獨數君詞鋒傳電檄劍氣動星文戎幕新無事髙談坐夜分從軍樂軍中録示諸將為問從軍樂東南早罷兵尚資磐石計同醉伏波營寶玦千金換珠纓五采成却慙揚子宅終嵗一書生其二秋原草色殘千騎擁雕鞍共道從軍樂誰歌行路難雕戈揮日落玉劍抉雲寒凖擬功成日同歸謁禁鑾聞總戎破敵有作功成指顧間一劍定諸蠻後騎方踰甸前軍已斬關凶徒應破膽黎庶漸開顏麟閣専相待征旗及早還過梅關五嶺壯炎服茲關勝獨超舄留南斗近劍侍北風遙夜艤商人棹晨經使者軺清時閒柝吏山水自蕭條五言絶句楚調曲君行巫陽道妾住渚宫湄莫戀荆臺樂輕拋桃李時紈扇詞皎潔渾無染團團孰與裁秋風原不妬四序自相催飲牛潭洗耳在潭下飲牛在潭上白鷺飛復來烟中立相向送人隱松溪送爾松溪上猿聲樹樹聞夜凉弄溪月衣上拂松雲寄友人去嵗春歸日與君成别離今年春又到君尚客天涯秋江漁唱漁舟晚唱來聲在秋江水月明曲未終前汀鷺飛起荷露翠盤捧明珠蕩漾圓復碎夜來明月中留得蛟人淚題美人撲蝶圖為惜韶華去春深出繡幃撲將花底蝶祇為妬雙飛從劉禮部折菊花歸三徑猶未歸東籬露華冷折得一枝來蕭蕭怨秋影望君山風來洞庭白雨歇君山青巴陵明月夜瑶瑟怨湘靈附詞一闋調寄唐多令湖水接天流君山一㸃浮倚丹青畫出層樓欲弔湘君何處也煙草色滿汀洲把酒記重逰相看漸白頭賦青蘋誰更悲秋却戀晚峯雲外笛滄海意付扁舟虛舟集卷四
