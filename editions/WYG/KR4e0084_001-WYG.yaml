body:
  text: 虚舟集巻一明王偁撰五言古詩感寓吾聞上古初渾灝本一氣羲皇肇人丈龍馬颯已至軒鴻埀衣紳唐虞臻至治有巢邈以逺黼黻日云貴自從蒼姬還𤣥酒薄真味鳯衰其如何寥落匪一世其二雙精激飛輪循虚節驚至逝川無迴波千秋倏如駛浮生日及榮孰與喬松齒君看邙山墳纍纍正相似鵙鳴羣芳歇大暮同歸矣誰知清濁間中有恒不死其三圓魄載陽燄終古無虧盈因人示朏朓側見死與生蟾蜍薄隂采顧兎潛其形何當凌倒景一覩天地精其四璇穹埀至象衆曜何煌煌能符調庶極帝車斡隂陽晝夜無停機所職各有章蒼精奉東璧神虎屯西央淵淵北辰尊穆爾居其方司契古有成無為位彌昌其五素琴絙朱絃中有流水音連城為之彈太息發哀吟仙人空中來鸞鶴翔幽岑斯意不可述江漢清且深其六中空發駕辯清聲間陵阿鄭客一在坐自以延露和至音乆寥寂窊靡世共歌俚耳不可尚竽瑟將奈何其七驅車首陽下望古懐清芬斯人久已化令名今尚存讓國就倫命殺身以成仁如何有千駟寂寞身無聞其八端居閲元文云是古苔編中有羽化術煉服可延年中夜養𤣥牝積虚成自然朝餐沆瀣粮夕飲玉醴泉東邀青童君西揖金母前笑攀若木枝頫見昆吾顛茲事茍不繆吾將命求旃其九真人趣恬澹漠爾中若浮無心亦無為日與至道游羣生接為搆水火鬬不休軒轅赤水珠須以象罔求寥寥六合間可以命虛舟其十太白夜食昴流輝燭天街精感動穹漢君心寕見懐白璧忌暗投徒使按劍猜所以狂接輿鳯歌歸去來十一𤣥穹貯幽黙至理何寥寥良窳潛一機迴薄如旋飈嬙嫫孰妍􅎀殤耼詎遄遼張生既中廢單子亦外彫所以塞北翁頗識理亂條云胡徇物者汲汲徒内焦咄哉感吾衷長歌且行謡十二龍虎啟晉伯熊羆兆齊封豺聲餒敖鬼牛禍成庚宗廢興自古來吾將訊其蒙蒼旻本何心至理元冲冲十三嬴皇􅕝威武漢帝非仙才𤣥闗袐靈府何處求蓬萊終遺鎬池璧空獻新垣杯但見三泉下寶衣變寒灰十四大庭昔酣醉遺此鈞天章遂令鶉首墟虎視吞八荒嬴基苦莫敦所恃逾兇狂詭命終見奪百二空蒼凉十五金行昔馳馭邊馬窺神州譸張厭神鬼狂恣輕王侯蹴踏五都裂穢濁三精収上天實禍淫所佑在祥休豈伊否泰運一氣恒相遒經過覽故墟落日黄雲浮㝠穹不可訊涇渭方安流十六商君挾三術西遊詫秦君上陳帝王畧邈已寧見珍陽春信寡和下里迺得親孔轍七十週信哉無停輪我有縈絃思區區向誰陳十七番番南昌尉不知名位卑上書抱區區忠懇何由知靈鳥鳴朝陽莫為世所希終然吳門市散髮招鴟夷十八蚩尤卓長空漢兵出隂朔材官三千萬旌甲蔽墟落長驅破轒輼萬里靖寥廓朔南無王庭功成衛與霍誰知青塞月白骨照沙漠十九元精格至理寂感通幽明造化雖甚微焉能外吾形飛霜激齊臺振風揚楚庭庶賤尚復爾况與至道并聖功極中和二儀為清寧緬彼歸昌音何時復來吟二十秋風肅萬物嚴霜下空庭不惜百草晚惜此蘭蕙傾祥麟一朝羈尼父為涕零大運固莫測聖哲那能營容成安徃哉逺跡良㝠㝠二十一艶色不足貴所貴在適時昭君傾國容遂為丹青欺蛾眉嫁絶域一徃不可追至今青塚月夜夜令人悲二十二玉麗不盈把德輝照四隣段生日偃卧迺能蕃衛君澆風薄士節自碎明月珍求蟬貴明火俛仰懐古人二十三闤居嬰世媒局束無安歩石火流狂飈憂來鬒成素誓言濯吾纓釋此出門去臨流弄滄浪升丘引遐顧仰羡雙飛鴻肅肅在雲路二十四蘭以薌見焚膏以明自煎髙才信非美賢智成禍愆龔生蹈偉節楚老有遺言清風雖可希惜哉夭天年二十五直木忌先伐甘井忌先竭何為抱區區昭如揭日月至人善閉闗埋照慎不發入獸不亂羣虛舟任超越襄壄迷帝軒汾陽枉堯轍棲心𤣥靈臺可與人世絶二十六春至百卉生感我池上情折芳玩新緑臨風為誰榮蠲忿樹合歡忘憂樹萱草忿蠲憂亦忘希夷自為寶二十七幽居玩羣生小大俱物役嗟嗟羽族微擾擾亦何極鶼鶼共聯羽精衛勞木石何如三青禽翹尾戴勝側二十八庖丁擅操割目行神為虛三年無全牛投刃劃有餘淵情妙至理豈受外物拘㝠筌茍不棄安能得神珠二十九凌晨採琅玕泝彼洛水涯翛然有神遇綽約間令姿投我以珮環却致交甫辭艶色豈不姣贈賂良亦稀但恐結縭好中道有所虧三十夭夭園中桃灼灼映綺忩忩中有織婦顔色如青陽三年弄機杼七襄成報章成章欲何為願以充君裳但恐不見察徘徊空感傷三十一緐條藴徂謝清宫媒炎寒涇陽擅秦寵豈得常交歡一朝成逺間斂怨東出闗昔日夭桃花今同秋草殘所以龍陽魚痛哉涕汎瀾三十二富貴千里合貧賤促膝離骨肉尚云爾何况他人為不覩竇門士請看藺庭綦翟公何為者謝客無乃遲三十三祈龍敏辯給惠施夸便儇竹書信激詭堅白方自賢騰口徒見尤胡能事幽𤣥九州誰復徵多方亦已然去矣桃李蹊予將欲㤀言三十四翩翩遊俠子出入咸陽城千金買意氣五陵交弟兄袖中徐匕首拂拭秋霜明十歩殺一人千里不留行世人矜勇智中貴聯芳聲末路賤行檢此輩方縱横至今季布死尚識朱家名三十五拂檻引菱荷當風和激楚皓齒揚修蛾清尊閒芳爼三川美少年五陵游俠子取樂不知疲但畏韶光阻焉知董生帷妙心在千古三十六我有太阿劍龍文粲竒章精光動星斗揮霍迴隂陽淬以金鸊鵜衣之古盤囊夜深雷雨驚恐逐風雲翔剛明易㸃缺貴能斂其鋩用之如發硎保之在深藏去去勿復道相期霄漢長三十七齧膝志萬里蘭筋何權竒長鳴一見馭蹀躞遺風追伯樂茍不值曠世誰能知離離玉山禾曷慰渴與饑八龍𦕈何許宛足長相随三十八東園桃李樹灼灼春妍華佳人不再摘芳意其如何白日每不退流光竟蹉跎大運苦難遇感此哀情多三十九孤鳯久不食所志金琅玕喧呼百鳥中束翮斂羽翰㑹當覽徳輝飛下青雲端虞廷方見待阿閣當空盤誰令抱威儀局促風雲間四十宋人得燕石自謂璠與璵徒勞什襲重見哂周大夫流俗久繆誤美價恒異沽所以卞和子抱璞空長吁四十一公軒處懿鶴白屋譏千秋菉葹盈髙閣申椒掩荒陬頎頎東方生虚為嵗星遊方將猿鶴化豈為沙蟲謀歸從紫泥海再弄青淺流四十二照影莫唾井種葵莫傷根傷根葵不生唾井隳明神樂生北去趙由余西霸秦壯士感知已鄙人懐私恩止止且勿哀千秋黄金臺四十三昏壁中始見烈風號北林飄飄逺遊子中夜抱單琴緐音激楚奏清商悲越吟豈茲異鄉感兼之年嵗侵胡為苦行役薄暮猶駸駸四十四四時有代謝千古誰成功昔時東陵侯今日𤓰田中雄劍且勿悲骫順天地同武安豈不偉掩關終何庸四十五桂樹生髙嶺揚芬散天風濯濯甘露滋泠泠被芳叢託根既得所衆卉羞與同幽蘭獨何為顦顇荆棘中四十六楚夫重鴟夷詫作丹穴翹鷃飛東南至文羽不見邀一鳴旭日升再弄律吕調簫臺有練實去去翔遐霄四十七世人競功利志得靡暫寧邴生事薄遊匆匆懐蘭馨游心不滯物泛若浮雲輕豈徒漆園傲百世同髙情四十八微禽變淮海流光遷驚湍人生豈不化徒結千載歡昔為金虎臺今見荆棘攅碧海不可蹈紫闗邈難攀誰邀大丙馭去覔無窮山君子行君子勵苦節恒在造次間造次茍不念履霜成氷堅邪蒿豈不美惡木豈不繁雖勞亦不息雖飢亦不餐顧此夙尚乖濁涇溷清瀾勝母里不入朝歌邑還轅徃哲有明戒君子防未然長安有狹斜長安有狹斜車馬相馳驅被服紈與素賓從閒且都金章何煌煌旄節照四衢借問従何來云自許史廬炙手手可熱炎凉在吹嘘豈無範驅子亦有歩矩儒一身困蓬藜終嵗空囁嚅秉躬信如矢不悟世道迂在昔弦與鈎封侯死道隅寧知此狹斜徑捷良可趨微生頗有尚夙志誓不渝念無此容顏䇿蹇旋吾車野田黄雀行黄雀何翩翩羣飛野田側飛鳥自相呼飲啄仍共適誰知遊俠子張丸事彈射腥驅薦鼎俎腐壤委毛翮㣲物何足甄感念在疇昔蔡侯富遊盤行樂方未極安知子發至一旦殞其國至哉莊辛談可以長太息不覩黄雀哀千秋復何益結客少年場玉勒驕驌驦寶刀耀星芒相逢鬬雞里結客少年場探丸殺公吏白日醉咸陽司隸不敢捕意氣凌秋霜一朝許報國投驅赴邊疆蹀躞匈奴庭萬人不敢當彎弓射月支斬首得賢王歸來不受賞出入金殿旁輕脱季布死却哂聶政狂鄙哉汗陽石不使俠傳芳今日良宴㑹三川富豪雄濟濟美少年驩遊及芳嵗鞍馬何翩翩秦箏奏新聲妙舞妖且妍今日良宴㑹意氣如雲煙人生若朝榮灼灼寧久鮮無為坐坎壈流光悲逝川置酒髙堂上置酒髙堂上豐㕑出鮮肥廣筵羅衆賓清尊間蛾眉羽觴若流星絲竹清且悲陽阿屢迴雪激楚超蘭猗晝盡繼以燭取樂良未涯流連豈不荒所慎白日移一朝委山丘琴瑟將奚為嗟彼蟋蟀詩無為世所嗤車遥遥車輪何遥遥西上長安道不見車中人空悲道傍草君行日已逺恩愛難自保憂來當何如一夕夣顛倒豈無中山酒一浣我懐抱但恐三春華顏色不再好車聲何粼粼風吹馬蹄塵願随馬蹄塵飛逐君車輪苦别離瑶瑟對玉巵中有千萬思欲彈再三嘆多是苦别離妾顔如秋華零落方在茲君心如逝水一去無迴時皎皎雲間月㡬見圓復缺月缺有圓時君胡苦别離歩虛詞東華青陽君授我寶篆文六角粲星芒讀之了不分謂之蕋珠篇玉檢得空云持此可度世出入齊化鈞再拜服至言歸來嗽芳芬火粒一排棄永此偕仙真其二卿雲爛冲霄祥景啟大羅紫㣲穆虛皇太清為我家鏘鏘八琅璈和以希夷歌一氣但浮衍至道良不頗頫觀區中縁蜉蝣競春華夭濁不自愛真意其如何其三精心仰真範稽首朝𤣥都祥氛結靈宇雙闕浮太虛離羅古仙人羽駕紛來趨㝠言感至理道化超羣無口吟三洞章身佩五嶽圖真詮諒斯在邈矣浩刼初其四瓊臺瑶圃西弱水扶桑東飈輪歘上征八龍儼來從整佩訪金母弭節朝玉童津津九霞觴粲粲方諸宫授以至道言所濟良無窮却馭俯倒景八表空㝠濛從軍行投筆出虎觀従軍事龍韜平生弧矢志誰慙五陵豪大江天宇晴平明集千艘組練照雲日戎師候旌旄一笑挽弓胎三杯拂豪曹酒酣意氣重萬事輕鴻毛袖中黄石編可與烈士髙又上將躬受脤鉄鉞専南征熊羆百萬師長驅下青㝠五嶺息瘴癘三邊讋威靈指揮動星漢嘯咤生風霆洗兵當載櫜斬馘期弗爭上以立國威下以甦民生周詩有遺什敢不滋令名遊仙曲為張真人羽化而作祥雲凝素華初景麗璇霄羽駕集萬靈上下何飄颻要𦕈笙鶴音和以空仙謡塵縁一洗脱頓覺神形超下士盼末光長跪不可招回飈灑而至矯首空雲翹其二剛飈載飛軒上泝無始鄉心㝠一氣表坐斷萬刼場茲來食色身緬邈情俱忘長歌畣雲璈朗詠流玉章空明結真無晝夜何煌煌嗟哉下土家仰止徒悲傷其三晞髮九暘城濯足咸池津松喬相邂逅翼我登飈輪金天謁西母紫府朝玉真朝遊扳曜羅夕憩邇結璘空同仰真棾愚濁慙下民因之一緘札稽首黄麒麟其四化機無停輪萬有互始終至人出陶鈞與道相無窮大庭儼羣仙羽葢時來從逍遥玉虛境一無每自同真詮久云遼至理標鴻濛何時復降世清都振𤣥風詠史達人志莫測變化猶鵬鵾倐忽翔九萬虞羅空見存莊生揮楚璧仲連却秦軍峻武薄層漢髙情寄浮雲昔過聊城側復經濮水濆餘風尚不冺肅肅來清芬其二狐白僅一腋勝彼千羊皮壯士出片言萬諾空奚為毛生逢平原自脱囊中錐提携十九人咤彼猶嬰兒一語定従盟不待日昃時英風被廣座磊落誠可竒知人豈不難長鋏聲同悲其三丈夫一言合不論故與新傾葢即相許白首如路人夕為牛下士旦作座上賓吐論即見收揚芳及後塵豈無私嬖讒不能間其親虞卿起相趙五羖西入秦一旦魚水歡舉屬疏賤臣志士慕知已臨風一馳神其四讒言信罔極搆亂成禍媒不有明哲鑒誰能知是非青蠅一朝集白璧成瑕疵姬文不見明宋墨名為隳賢聖尚云爾耿耿將誰為爍金不待燃毁骨痛莫追空懐素絲志寧却貝錦詩白圭懐魏珠季子食駃騠膠漆茍有契誰能為别離其五芝蘭生中林寂寞翳荆杞豈不擅芬芳乃與茆蕪齒丈夫昔未遇憔悴亦如此范睢快仇敵蘇秦笑妻子淮隂出胯下相如困泥滓悠悠世俗態落落誰知己其六戍役赴闗隴馳車經洛陽羣公蓊雲集節鉞何輝煌炎精啟初輝云定神鼎方顧瞻瀍澗瀕山川蔚蒼蒼脱輓棄道左躡履整敝裳叩軍陳便宜炯目如曙光析此利害端吐論何軒昂咸秦古天府百二誠帝疆丈夫鏡時機識此理亂章一語棄貧賤笑談綰銀黄此儒竟何為空守蓬蓼場其七賈生洛陽人年少有逺識當其痛哭時漢祚如磐石其言非實狂四座為動色抱火厝積薪寢食方自得長沙卑暑地自古舞鯤窄吞舟詎能容驥足誠窘迫弔湘見㣲志感鵩成太息道大古莫容夫子亦何極駑駘服上襄騄駬棄道側卓哉治安書遺耀在簡册其八昔人有竒䇿折衝尊俎間何必百萬師出入無時閒司成久不作晏嬰邈難攀廟勝久已非徒興聖父嘆莫酬突徙薪賞及焦面顔神功貴無迹此道良獨難其九三卿譏世及孔華粲若星尾大恒不掉拊枝攀根榮火光儵中㣲五䜿並列庭禁兵設蘭錡金彯貂長纓私門填萬軌指顧山嶽平龜鼎潛欲移擁弱徒虛名豈無賢智謀發言炳中誠根蟠固已久大運終就傾其十彭薛志已卓貢公榮未遺二邴近止足兩疏明見幾朗識洞在初何勞張械機功成有代謝四序恒推移狂瀾方横流六合飄驚颸天損不我加至樂同希夷十一鳯躍難為枝龍潛難為淵驥足不一展百里枉大賢士元困已委文舉類左遷茍足知已明虛為世所捐劒埋風胡悲璞殞卞氏諐黄鐘雜瓦缶舉世方復然十二翩翩城隅雀所產得鵋䳢孰云小可臣殷祀乃忽而正祥不足恃昏狂禍之基畨畨老黄冠出語驚耄期嗟哉倪侯館得死乃所宜虛舟集巻一
