body:
  text: 虛舟集巻二明王偁撰五言古詩遊小雄澗壑有成隂島變殘雪流新吐溶溶偶尋一徑微獨與採樵同兩崖濕花霧衆竅吟天風雲根濯苔髮亂篠相㝠濛盤嵓折磴道似各㝠搜窮石門忽中斷曠望開烟叢蘿雨澤毛髪松栝清心胸了然青洲霞照影寒潭空始知人境外别有仙源通振舄揮片雲投情依逺鴻𤣥棲極要𦕈神遊小崆峒真仙金鵝蕋一室丹火紅勅授紫囊訣永期變鶴蹤却憶望城市白日氛埃中尋小雄仙嵓二龍潭值風雨歸草堂作昔人洗玉髄幽洞驅龍耕丹成輟瑶耒成此秋水泓飛厓夾兩鏡洞見雲霞生百鬼不敢啼雌雄常夜鳴有時湍瀬寒㡬曲流瓊英清秋堕蟾影白日聞雷聲偶兹訪靈竒掃石窺清泠洗心盟鷗鷺濯髪解冠纓長風動懸羅颯爽毛骨驚飛雨洒而至萬壑秋㝠㝠歸途檉桂影了了心目醒到家興未已石室披丹經登屴崱峯宿湧泉寺得仍字翠㣲白雲裏逢秋思一登聳身躡雲壁飛泉揺古藤洞豁海天際坐見萬景澄飲澗動羣鹿宴林逢真僧邀我宿化城珠林懸古燈寥寥片月上悄悄天籟凝因悲向城市塵髪秋相仍水亭夜懐黄八粲林六敏孤亭水雲深人境自幽絶七絃罷鳴彈桐隂初上月偶酌尊中醪髙卧望雲闕荷露清角巾松飈濯毛髪寥寥天籟寒吟咏了未輟志偕南阜隠興藉東山發同心念離居中坐思超忽入西山訪張隠士兩涯噴飛瀑結屋烟蘿裡山人不冠履客至同隠几獨鶴海上歸孤雲澗中起净掃白石牀風來堕松子晩至石潭遇孤鶴懐仙洞口拾瑶草石流正淙淙尋源信輕䇿一徑披鴻濛攀縁雜花島亂聒松桂風石牀留片雲玉鏡莓苔空少焉羣壑靜落景明西峯獨鶴何處來舞影寒潭中因之想長馭乗化入無窮遊清源别後寄温陵田處士夙性慕𤣥賞少年復離羣囊書不得意菽水懐親恩請纓卑任俠㸃筆徒工文腰間脱寶劔歸卧清溪雲擢歌有時閒放浪滄海濆雲水秀孤島石壁澄霞紋茸茸紫藤花濯濯敷泉根鶴影波上歸龍吟水中聞興來拂瑶軫蘭情灑餘芬曲罷劃長嘯衆籟清衣巾夫子弄玉簫邀予醉瓊尊紅泉看洗藥碧澗思埀綸區縁一以説恍若超埃氛别後緬靈境中夜飛吟魂昨夢紫峯岑月色何紛紛清光阻天未眇懐猶為君拒我手中䇿拂我衣上塵明當營丹砂去與壺公隣晚至嚢山寺蒼山入踈烟狀若土嚢决振衣秋磵鐘投舄化城月天吟動風籟霞想陋雲闕沉沉慧燈影了了見毛髮余生值多故所性慕禪悦偶偕真僧期始若妄縁絶㝠心依覺塲度世賴慈筏誰能量虚空澹爾離言説自牧居士與玉壺道人古嚢善復二師共結三生之社書來與余論老釋二師遂用畣之觀空冺羣有崇虛悟真𤣥㣲言掃煩障妙契排㝠筌况之憩逺跡邈在雲蘿巔空香入人境花雨來諸天三縁等無生衆妙同自然喻心了無取濯濯如清蓮襄城除害馬祗舎留真銓願君解明月示我造刼前遊清源山道院仙人有竒觀鷄犬白雲裡春至桃花開千枝映流水星壇藥草青夜空丹光紫天上期鶴笙人間識島履伊余倦俗流千載困泥滓久矣期大還乗風一來此金書啟真秘石洞洗𤣥髄河車信可營心期羡門子登薛仙峰寄自牧知已小年學劍術頴脱神鋒生身嫺韜畧書吐論吞從横傍搜百家言復得夷鞅情自顧萬人豪不慙一代英擔簦赴神州十上空無成巍巍黄金臺邈哉阻天庭歸來守故墟索寞羅秋螢作書謝知已閉門絶浮榮悄悄林下居一室有餘清閒尋白社約或作青山行傲吏期解冠漁父同濯纓縦酒竹林逸尋仙松子盟匣中雙寶器棄置蛟龍鳴偶兹凌丹梯足下雲霞昇孤鴻天外出白日波上明九節菖蒲花採掇延吾齡飄颻羽人居蜕骨遺𤣥經吸景若可弄丹砂思一營惟君抱孤絶襟懐洞春冰相期茍有志雲鴻極㝠㝠與鳴秋趙山人夜宿山居述懐有贈塵居厭湫隘抗節慕逺遊道逢佺喬侣假以雙翠虬周覽六合虚閬風不可留兹山富形勝歸來事𤣥謀紉蘭理初服飲水期前修芳盟及嵗晚世事輕雲浮伊人負竒抱泛若乘虚舟斂跡三十年不應當世求髙齋探𤣥黙衆妙窮㝠搜有時發逸興登臨眺髙秋鳴奕送天籟酌酒環清流朝尋蘿谷曉暝期蓮社幽布衾清夜䦨欵語相綢繆冲懐薄華組心跡同悠悠青楓落逺磵芳蘭蔽層丘眇彼天際雲非君誰與儔送陳貢士陳生江海士趿履當豪門五侯少知已倚劍思平原海國一相訪别余歸故園杯銜霜夜月袂拂秋山雲四望大野空蕭蕭鳴鴈羣意氣但自許離懐何足論送黄紀事濟寶劔雙轆轤鍔吐青芙蓉臨岐一脱贈恍若騰蛟龍君行感我懐起視雲海空百年閲幻境萬里吹飛蓬登天覽餘暉孰挽濛汜東詩書古有立貧賤道何窮常希日月私獨負雨露功長卿卧茂陵不為世所容季子黒貂敝當年怨秋風泥塗困布衣渭水悲釣翁山松落澗草海鶴羞樊籠大運自古來俛仰那能終感兹不成歡别去何匆匆城南登髙丘眺逺情所鍾一水㵼寒練斷雲引歸鴻中座擊筑心醉吟氣頗雄興落逺天碧思染秋山紅暌離自茲始夢繞青林楓存耕堂原田積荼堇莆田莠驕驕何如方寸間濯濯敷靈苗内顧無町畦孰能辨肥磽蟊賊莫我害旱暵莫我焦但願保良稼毋令崇艾蕭悦心齋稟化凝正氣虛靈淡無為鑿鑿方寸間熒熒啟天機匪伊芻豢甘不假文繡資一理茍不昧為善咸足怡雍雍樂道園蕩蕩崇德基徃哲有遺訓服膺諒無違守黙礪石鼓天讒敖客司南箕昭茲捲舌戒可喻緘口辭無言希聖謨守中當我師誰知淵黙中成貸良在茲其二哲人守樞機所慎在禍門存心堅玉鑰内顧乃靜専金人埀徃訓白圭有遺編三復諒不忘令名當與全其三便便夸毗子辯口相矜欺寧知起羞訓悖出來亦違一朝捫舌悔四馬曠莫追我思磨兠堅千載猶須斯其四躁妄伐天性幽元養明神如何嗇夫雄喋喋忘苦辛辯鉅恒若訥辭多非吉人君看桃李花無為禍所隣素齋大樸斵已久斯人抱冲襟寥寥一室間坐契千古心片月瀉寒練疎雲澹流隂俗塵飛我緇名跡寧見侵靜念真素流端居積幽沉何當啟𤣥秘一奏瑶華音褧齋黄中貴通理至文斯黯然如何表暴士藻飾徒外鮮斯人當自治齋居日乾乾褧衣服明訓白賁守聖言豈無黼黻章所惡非至𤣥山輝玉藴石川媚珠藏淵炳外㑹有時弸中道彌宣慎獨㳙流一髮細厥患誠滔天煌煌燎原火起自㝠爝間人生理欲㡬相去良亦然滋明實隠㣲昭灼天與淵所以徃哲謨慎獨埀至言存誠保天君兢懼無過諐撲燄在始熱塞患當其源美哉屋漏詩三復當拳拳拙齋渾沌七日死衆巧雕斵之孰知希夷初民生乃無為所以漢隂叟機事戒莫施抱甕豈不勞我心恒自怡習靜山房潛虛念無事幽齋閉空林超然燕坐間孰識靜者心悠悠塵慮忘悄悄天籟沉良斯守𤣥黙何必丘中琴其二萬物互轇轕探探無停悰我心念何為淡然惟抱冲鑑明止水靜雲斂青山空始知造化樞乃在淵黙中其三齋心遁喧俗一室絶垢氛寥寥天宇空鏡覽萬化源芳林謝春花空山變浮雲理勝亦有時於茲可忘言其四莊生守宇泰老氏念無為惟應屏物累可與悟𤣥機狂流射波瀾世路多險巇此心方寂如安能為變移養素為黄山道士賦太始逺無象浮生多磷緇紛紛白黒間誰能辨雄雌至理一朝變文章雜然施雕斵樸已喪青黄木為菑念子葆冲素觀養得所宜一氣每獨完三素流華滋黄農有真趣坐見淳風熙味菜居為俞延平賦菜根有真味淡漠良自然長筵列氷壺愧彼腥與膻况君理劇郡日晏飽一饘已瘠民以肥何必具萬錢鄙哉肉食譏不顧口爽言惟應勵斯節可以酌貪泉永思堂茫茫宇宙内蕩蕩成古今凄凄霜露繁惻惻遊子心終天何漫漫長夜竟沉沉庭闈不復趨宰木風滿林林中有啼鳥嗚嗚吐哀音感茲物性㣲我懐良不禁入室若有見焄蒿或來臨區區抱遺體戚戚幽怨深嗟余念弗髦多難早見侵為君賦永思潸然淚盈襟夢萱堂為孫進士子良題堂前種嘉草端以志親憂我憂何能忘愛日遲此留如何一朝變庭樹驚髙秋悲風委殘緑薄暮寒颼飀緬懐堂上人欲展情無由慘慘隔下泉㝠㝠閉荒丘惟應中夜魂庶以慰永愁其二中夜有遐思寤寐忽見之覺來起徬徨四顧令心悲是時返哺烏方遶庭樹枝㣲禽果何知亦各懐其私念我罔極恩欲報情何施鑑帷月姢姢動幔風凄凄鸞哀不成章隕涕雙漣洏其三白楊風蕭蕭日久來古道不見堂下萱空吹墓間草緬懐疇昔時如何間音儀入室若靡至出門當訴誰上山山有巔渉水水有涯傷哉陟岵心永作終天悲其四日沒晨復旦海落潮再生如何長逝魂終天竟㝠㝠長風振林柯颯爽久不停心將寸草折淚逐衣線零倚門不可見登輿竟誰榮眷兹椿與梓頫仰當中庭愛日堂為陳編修全賦羲和整六轡晝夜無停機青陽方届候朱火倐已馳壯士感芳嵗佳人惜流暉懐我孝子心視景起徘徊奉觴庭闈趍喜懼恒共之去日不可留來日方在茲中堂絃管清疏房幃幄埀誰揮魯陽戈為我駐四時節婦吟為上虞黄氏作祁祁寒日暝嫋嫋秋風涼凄凄捲素幔切切悲空牀昔為雙飛鴻今作獨宿凰妾身豈復惜子㓜姑在堂捐生諒非難老稚誰扶將日月良有食海水良有極妾身千秋年當化山頭石虛舟剡桂破崑玉刳蘭移楚芳濟深良可憑横淺徒自傷偶值䝉莊叟無心寄大荒山中寄郡城諸生還山見孤雲悠然與心契素琴横石牀泠泠寫秋意却憶社中人寥寥在城市厯峰蘭若宿偉上人禪房烟林晚蒼蒼白石開禪扉閒中叩幽寂恍似東林時大千息羣動水月破隂霏出世逢真僧允矣旃檀枝空香出深竹棾貝諸天随真源寂無取化有潛一機嗟我食色身未能釋羣疑嘗希妙髙聚洞豁杳莫窺因心了衆幻稽首成皈依秋夜齋居懐唐泰髙梧月未出暝色疎烟裏雝雝鳴鴈來聲在秋塘水孤燈捲簾坐寒影對忩几青空吹㣲霜瑟瑟動輕葦援琴不成音感别在千里誰值晨風翰淮波盼游鯉寶山蘭若山門隠松桂花雨浮半空金仙青蓮居乃在烟霞中石竹覆紫苔四璧泉濛濛因窺一燈影晏坐萬刼同衆籟清棾音浮塵愧㣲蹤願言别苦海永矣投禪宫登仰山一覽亭久懐名山遊偶宿翠㣲寺化城依寶坊累刼即初地心空萬籟寂夜久衆壑閉寥寥水月觀了了獨忘寐凌晨覽孤峰更在白雲際躋攀興未已恍惚身若寄危欄儵而倚曠望海天細松際烏鳥巢簪裾落烟翠惟時物候肅千里軼纎翳神行極空濶豁爾心目霽翩翩鸞鶴影冉冉芝蘭氣浮蹤浩天遊蟬蜕隔人世顧余眷名藍似與夙縁契因偕緇錫侣尚覺章甫累便當脱塵纓投情緬靈異牛路春耕晨光照墟里屋下春泉鳴驅牛出東阡旦作農事畊不惜筋力劬但願禾黍成遐哉鹿門意千古斯能并龜湖晚釣投竿緬平湖興與雲水俱直鈎豈無取所志不在魚荷蓧者誰子得匪商賢徒偶來坐磐石共諒希夷初兎峰孤月靈鵲堕寒羽清輝澹溶溶誰將一片秋絓向溪南峰蔓壁絡金鏡隂忩鳴夜桐幽懐逈未已香靄東林鐘鶴峰閒雲前溪孤嶺秀旦夕浮雲隂暝結鳥巢白靚連蘿蓽深蕭蕭丘中賞游心在鳴琴悠然太古調相期鸞鶴岑龍寺寒泉靈源沁寒泉仍在翠㣲頂中有修鱗蟠白日烟雨暝山仙習止觀水客照孤影予亦洗心人坐來白雲冷烏崖積雪隂崕積空雪粲粲照前嶺山人拂瑶琴風來布衣冷疎林浮曙色孤鶴沒去影疑有剡中人溪頭櫂歸艇塹石歸樵旦出事斤斧薄暮歸青林澗迷猿鹿引路滑莓苔侵白雲覆我頂山風吹我襟嘯歌靜炎燠邈矣烟霞心漳溪晚渡㣲鐘逗前林林端晚烟發扁舟去俄頃雲水空超忽中流離思起天際孤帆沒日夕緬同心相看成楚越草堂成題以見志幽棲搆茆宇窈窕雲蘿中潛光葆真素遂此達世蹤青山列前楹金飈但鳴松聽之比竽瑟玩之若芙蓉簪玉豈不華列㦸非凢庸重闗邈天路短翮慙排風瓢飲潁水淥邑謝駢氏封散帙期道侣假寐登方蓬茲焉遂偃仰沆瀁應無窮其二五陵遊俠場中林隠淪託寄情傲世詮矯志在𤣥漠况茲棲息地風景擅丘壑瑩神汰餘滓引氣事虛蹻匠樗笑支離莊瓠慙濩落有時睇崇丘緬想契衛霍雲霞冠層巔松桂被叢薄金膏逺輝煌水碧亦連礫采掇欲有貽𤣥情在寥廓其三自惜藜藿腸不懐肉食憂鳯凰覽德輝黄鵠千里遊出處各有宜何必相嘲尤羊質冐虎皮祗足承之羞誅茅架岩壑逺託茲山幽追攀絶人競靜然保自修朝擷石上英夕漱澗底流五難一脱畧養生復何求其四金張七葉貴出入珥漢貂亦有張仲蔚中園隠蓬蒿窮達自有分貴賤匪一鑣誰知衡茅中於焉可逍遥閒從閔叔飯幸有顏氏瓢夜來白露團商聲振林飈泠然白雲章逺和緑水謡緘辭寄三島目極天寥寥其五寒谷待鄒律虞韶來鳯儀堪坯育萬化感召理亦㣲谷風應兎嚎空雲擁鱗飛茲生豈不念潛躍㑹有時况予輪翮纎而乏塵世姿雖不事巢蠡敢與周任規超遥一死生散朗忘是非陸沉古有然安用人所稀𤓰田寄南山處士種𤓰一畆間榛蔓苦翳之雨深苖未抽惻然令我悲侵晨行荷鉏芟刈亦忘疲仰觀天宇寛俯視羣物滋却憶南山老終年澹無為練溪波小水溶溶湍急秋濺濺颺風皺㣲綃漱月皎平練鮫人寧敢専謝客或來玩菊逸為三衢金山人賦百草委霜露黄花濯其英端居忽見之遂此遺世情臨風擷朝餐採掇巾袖盈顑頷良所願况云製頺齡其二閒居何所營種菊繞籬下種之亦何為愛此傲霜者秋香襲衣裾寒色堕杯斚豈無洛陽華所貴輪鞅寡其三結廬避喧俗青嶂託四隣乃知寰壤中而有羲皇民閒邀白衣酒坐對黄花晨所樂憂患除陶然任天真其四郊原掩窮秋孤思久寥寂賴此霜下英庶以見顏色開尊命濁醪取酒聊自適坐望飛鳥還不見南山夕㸃蒼山為戴少府賦峨峨雲中山萬㸃積蒼翠壯為九夷尊獨立九嶽外孤峰盪層雲衆壑走空籟仰瞻參旗光坐見斗杓大乾坤寄端倪日月論顯晦真流入㣲茫僰鳥飛霮䨴秋髙崖勢豁春至林影碎天聲迴滄溟曉色浮渤澥登攀客趣恬眺覽宦情醉搴帷與駐笏為我謝先輩畫馬篇為童將軍賦聖皇覽乾馭天駟流星芒太乙貺靈異倐見渥水傍神精何權竒意氣尤軒昻两顴夾明月四蹄亂秋霜早為汗血駒三載清大荒長驅掩上征逸態凌雲翔驍騰日萬里脱畧誰能當歸來驂六龍殊恩擅中黄賜浴天池津剪拂鬚鬛張顧影驕玉姿含嘶泛清商丹青特餘照對之亦騰驤駑駘世豈乏伏櫪空成行題醫師巻相業久寂寞濟世誰稱賢賴有肘後書可拯斯民顛親逢長桑君飲以上池泉置之百一方洞見五臟偏羣生欲為闊夭札相沿旋七粒或見遺沉痾頓而蠲至哉神聖功可以侔化𤣥中和逺莫躋獨與岐黄専奈何􅎱疾者尚忌良工先腠理忽不治膏肓竟胡痊因君感吾衷示此元命篇晚宿雙峰驛樓與故人陳哲言别山暝烟已斂林凉月初生扁舟沿江汜候吏欣相迎登樓引孤興開筵坐空明杯分斂溪緑簾捲雙峰青几席湛碧流蘭氣浮冠纓泠泠露叢鵲中夜四五驚偶因念物性終焉感吾情十載懐一枝三匝棲未寧茲晨胡為哉又逐孤雲征良宵一邂逅明發増屏營蕭蕭衆籟寒萬壑同時鳴緘辭别知已解纜揺行旌讀書樓為四明王子沂賦曠野豁烟翠層梯標石叢奎輝貫忩牗颯颯來天風良宵清諷音飄落如半空雅調既云逺古心誰與同豈無華搆崇飛軒切層穹春風羅綺醉落日烟花紅詎知靜心者兀坐窺鴻濛游心太古巢寤寐雲霞中幽艶適自媚清芬在無窮題畦樂處士成趣園凌晨啟柴扉有客過我廬雕鞍照玉勒輕紈曳羅襦入門坐髙堂騶從閒且都自言匪他人少小六郡徒二十登漢朝三十執金吾五侯吐然諾七貴相追趨笑我久淪落勸我無迂疏富貴不早致白首徒棼如而我聞其言笑謝陳區區緬彼堂構姿安用散與樗以茲避軒裳悟靜解天誅况云樂丘園取適自有餘朝搴邵侯𤓰夕灌鮑氏蔬榮辱不我干憂患豈我虞閒心託浮雲不知巻與舒揖客上馬去還歸倒一壺其二逺生貴忘我守靜體自然外物茍不榮取樂無過愆鼎食豈不甘軒裳詎匪賢大功難久居盛名難久全淮隂登將壇條侯寄重邊寵辱一朝異殞替誰能憐寧茲逺世氛寄身在中園閒濯魚父纓時誦老氏篇曠志適古初㝠心超至𤣥知止幸不殆胡必誇輕儇嗤彼當世人碌碌随貸遷端居有真趣此意誰能傳其三勞生厭喧市養痾閉幽樊角巾念何從孤興寄南園南園曠且深春至卉木繁嘈嘈鳥雀鳴聒聒泉流喧呼兒牽蔓籬殷勤薙荒殘時雨倐已至佳蔬茁而蕃臨風襲芳馨繞籬擷蘭蓀倦來聊自息支頤對前山載歌緑水詞和以白石言東陵有傲吏邀我相與旋取意一自慰此外寧復論其四稍烟吹林墟㣲雨被空谷雜來翳層陂秀色宛如沐籬落相逶迤鳥雀繞我屋行行出幽徑散帙寧見束濯纓臨清流解帯絓修竹殘花明亂畦曲沼䕃喬木神行趣已恬理愜心自足閒情適虚曠空籟時斷續茲焉謝紛擾亦以靜歊燠山風吹衣巾落日候樵牧顧同張翰心寧事季主卜題友松軒交友道日喪伐木空遺音因人樹榛杞感物論素心豈無桃李花朝芳夕仍改何如松樹枝青青色長在傾葢白日晚忘形霜霰深庶其嵗寒意永矣諧南金題黄鸝圖伐木輟遺響索居抱幽清緬此幽谷姿如聞求友聲我欲徃和之水緑春山青辨誣代常山吳權作相逢白晝間豈盡攫金者亦有披裘生採芝當盛夏東陵髙西山孰辨真與假長睇天地間茲懐向誰冩不疑懐直躬取惑在同舎白璧棲青蠅可損連成價大夫埀貞觀庶雪覆盆下古意二首寄鄒參政濟火旻儵西流庭柯落疎影端居掩空闈懐人思方永月華漏疎隙風籟籥𤣥牝殘編散金帙鳴琴罷瑶軫相望更何許迢迢寄江嶺折芳欲有贈奈此霜露𦂳憂來當何理一夕變𤣥鬒其二亭亭江上樓綺忩洞然開上有愁思婦感嘆當為誰良人别經年遊宦苦不歸憂來不自媚堂下尋履綦感彼三春花將同秋葉飛中懐如轆轤日夜不停移髙堂張素絲彈作别鶴悲餘音入雲漢何由使君知晚至洞神宫晚直下仙闗乗閒清道機福地集萬靈迢遥麗神圻入門喧有息㣲風吹我衣烟林閉虚境宻竹埀隂扉於時東嶺霽素月流清輝妙賞愜初願閒心不知歸夜桐有商意掃石横金徽遊靈谷寺東城領霞矚北山開禪宫松聲度衆壑塔影懸晴空衣冠有時暇幽期白雲中八水覔解流三生咏𤣥風上人啟竺墳説法超羣䝉是時寶花堕十里香濛濛别來問𤣥度㡬日還相從楊進士新卜幽居大隠在朝市蕭然小蓬丘藥欄醉歌鳥竹逕沿清流良朋偶而集雜花映觥籌遂忘簪組念頗似山林幽片雲池上來傍我几席浮重遊未超隔佳㑹何能酬與諸公同遊神樂觀凉雨度髙閣蕭條秋氣深洞門薄㣲寒逸興生前林道人琳館靜開忩修竹隂詎因避書簡偶此諧纓簪掃石鳴素絃遂忘名跡侵前山倐已見秀色浮重襟翳翳青桑枝颯颯來逺音笑言欲遺返落影明西岑畫菖蒲晞髪慕逺遊端居閲𤣥文願言金光草緬此九節根芳叢何葳蕤冉冉幽澗濆溪雨濯秀色林風動清芬嘗聞嵩山客乃是九疑君採佩却百邪服餌諧仙真蓬壺翠水區𤣥圃鸞鶴羣吾將整吾駕去與烟霞親寄壺山道士清溪幽且深猿鶴邈雲嶠中有㝠棲士隠几若埋照我昔従之遊逺落蘇門嘯顧余指石髄示以斯道妙其言直而純梗槩領其要别來在風塵摧赧中若燎未遂鴻鵠舉將貽碧山誚因之冩雲緘日夕引遐眺題林處士璧荒居厭藜莠寂如張仲園閒來枕肱卧廓爾排真筌仰觀浮雲生舒巻任自然綬無蕭氏結冠乏貢公彈暝色起修竹寒光流逺川因心𤣥㝠子共樂壺中天别意寄友人北風吹浮雲飛度秦淮水西江與之馳迢迢去千里端居懐離憂對此曷能已在昔巧笑言宛若雙飛翰别來不須臾邈在天南端為君啟瑶琴臨風時一彈中有白雪操哀響聲未䦨日月有弦望寒暑亦循環棄置茍不移相期金石堅寄題吳太僕鑑滁州皆山軒環滁富山水秀特東南叢蒼蒼瑯琊峰削出金芙蓉芙容夾蕙帳萬壑縈相向岩烟吹亂霏滅沒不可望昔人五馬來笑舉青霞杯雙旌舊遊處石徑滋莓苔至今餘松聲瀟洒在林薄絶巘瀉飛泉孤亭倚寥廓懿哉延陵君此地懐清芬開忩引列岫坐詠醉翁文醉翁久不作羡子有仙骨良時但開尊公暇惟拄笏雲生島樹沒雲散翠㣲連璧月動海色亘若壺中天嗟予戀塵鞅青山勞夢想為君發孤吟風泉寄遺響秋夜同諸公神樂觀玩月秋臨萬象空良夜寂如水了然東山月照影清尊裡塵蹤厭汨沒緬此方悠然况有仙壇髙俯瞰區中縁坐授紫霞笙嘯引琪林鶴參差斗未横零落露已薄朋簪諧夙驩佳期感二難中思拂衣去永卧烟霞間初秋夜坐寄王紋輕飈生早凉孤館清興發桐隂落前墀遥空瞰華月方此抱冲素况值清境豁濁酒聊自持瑶琴弄應闋知音念乖阻咫尺不可越相思良未已坐見曙河沒送張謙東風變碧草積雪開紫垣都門集同袍酌酒送行軒劍歌一何長波烈驚心魂丈夫顧義分豈為兒女言名駒出幽隠枳棘鳴祥鵷千年值嘉運萬里期騰鶱其二崑山固多玉抵鵲良可悲羣龍方盈庭子行獨何之空懐徑寸珠粲粲五色輝相投不相矚魚目甘同歸至寶豈真秘良材終見希誰能辨瑜瑾遲爾黄金閨其三醉呼秦淮酒臨岐歌慨慷吳姫小埀手一曲春風長扁舟不停橈去路但茫茫青山入楚甸白雲思越鄉豈無壯士懐擊節心飛揚慿將繞朝䇿一贈嚢中裝其四海鶴青雲姿豈解司晨鳴時來暫斂翮終當遊太清奔鶉復何知開口笑沉㝠飢來不飲啄再唳長風生請看昻藏軀寧與雞鶩争維應瑶臺鳯可與蜚英聲其五故人發白馬翩翩臨路歧腰間脱玉劍贈子表相思霜鋏爾勿彈狂歌欲為誰英風洒毛骨四座驚别離别離豈足惜意氣方在斯何當凌九萬並駕青雲歸投胡學士撫劍坐中夜長吟思一彈彈之有餘音激烈摧心肝出處分以然中道敢不安但恐春華衰白日凋朱顏伊余羽翼㣲宜棲枳棘間清樾茍自適誰能事鵬摶那因遇知己刷羽排鵷鸞雲霄一翺翔九萬期風端昔侣丹穴雛志薄金瑯玕今如涸轍鮒鬐鬛空摧殘有沬不自濡焉能禦所患淮山饒桂枝楚澤有芳蘭欲去戀明主引領徒悲歎故人把天瓢豈憚一滴艱願因終號呼庶以脱險艱毋令東溟使仰候西江瀾送僧歸越中錫挑龍河雲衣帶越溪雨説法方西來随縁復東去松枝偃故房栢子落庭樹從此上方遥人間但凝佇虚舟集巻二
