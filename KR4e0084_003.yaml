body:
  text: 虛舟集卷三明王稱撰五言古詩賦得幔亭峰送張員外還閩中秋色照海甸百里青嶙峋衆山如游龍一峰髙出雲昔傳武夷君於茲宴曽孫鸞飈載河車來往何繽紛羽蓋云已久𤣥賞今尚存夜深天籟寒猶疑鶴笙聞而我昔遊覽望之隔塵氛天影㵼潭鏡翠碧明微曛别來區中緣汨沒摧心魂茲山不可見夢寐懷清芬張侯有仙骨幾年在雞羣中林赤松期久負瑶池尊斯行問初服訪古清溪濆幻宇結空翠層崕閉氤氲棹歌九曲來餘聲振衣巾玉女或可訊為余謝天真送吕沁州良材蔽幽壑大匠終不遺驊騮困百里伯樂為之悲顧無適時材焉能嗟明時使君姑蘇彥夙負英俊姿開口論阿䝉耻為吳下兒倐起佐民邑頓令絃誦施朝餐戒貪泉夕寐抱素絲松柏有貞操不受霜雪欺一旦勞譽流徵書走南陲衡鏡懸大庭凖平良在茲五馬錫中廏雙旌擁前麾銅鞮古沁源尚在羊腸西居人迎露冕稚子瞻纓綏行將寄専城蚤為蘇民疲春風五袴謠莫遣歌來遲送杜參政之廣西五嶺隔南服輿圖亦茫洋昔為椎髻區今變冠與裳蕩蕩風氣開生齒日富强叢山薄大海壯哉封四疆邇來覃聖仁幽昧靡不彰人材上國齒兵賦擅一方惟公寄重牧虎節何輝煌上以紓國懷下以撫凋傷當令寒谷吹撚指回春陽桂山方峩峩桂水亦湯湯誰與傳誦聲千古流芬芳送胡處士還豫章我懷髙士風矯然若游龍南州久寂寞水碧青山空夫子振流俗清芬千載同明時棄軒冕白首棲雲松出門不逺適西到匡廬峰天風吹衣巾飄落塵鞅中倦翮思故林孤雲懷舊蹤角巾灑秋雨别我金陵東冠蓋餞道周雕筵進肥醲揮之一不顧舉目送飛鴻寒波駛歸流川上落日紅孤鶴倐已逺悵望那能窮送胡郡守歸泉州吾君撫城運治化期虞唐藹藹吉士征庸庸登廟堂南風五絃奏端拱垂衣裳鷹隼有時擊威鳯鳴崇岡夫子南國秀乘時亦翺翔姓字落御屏久霑雨露香茲晨按節去肘後懸金章春來刺桐花飄飄㸃仙裝褰帷出白鹿竹馬夾道傍愧我斥鷃姿逺逐鵷鷺行送君都門野握手神飛揚雲開五湖白鳥沒吳天長雙旌忽不見酒醒山蒼蒼送徐布政之廣東連山隔星紀雄藩控邊陲內分青瑣彥逺牧滄海涯春雲擁畫㦸白日明繡衣一朝立意氣萬里生光輝都門别同袍尊酒秋風時丈夫貴有為豈作兒女悲停杯贈馬䇿脫頴囊中錐何必守章句終年困蓬藜送劉太守之任福州海國變民俗君行領専城千室豈云小所志在蒼生烈士慕知已編民歸頌聲驅馬登古臺覽望窮滄溟山雲拂露冕海月生霞旌鄙人舊茅屋桑梓連雞鳴溪流九曲水門掩三山青異時偶樵牧此日慙簪纓因茲送君去悵望難為情送鄭舍人之嶺南祥因散華甸靈景耀神圻東序盛玉帛南面埀裳衣五嶽畢效靈八荒殫同歸欣欣木德榮郁郁皇風熙矞雲從何來欲抱紅日飛微風忽吹去使我心徘徊春山黃鳥鳴離筵醉斜暉淹淹江漢流此㑹當何時鳯凰鳴髙岡載見終來儀文明正茲日忽嘆知音稀送林少府還九江得月字握手白下門棹歌莫催發且沽玉壺酒共醉金陵月明日望匡廬孤舟坐超忽齊所示同宿諸寮友華館敞清夜空香靄氤氲孤懷湛如水因之絶垢氛城闕度疏雨河漢霽微雲明發奉禋祀坐待禁鐘聞秋署中寄鮑紀善出門車馬喧秋煬烈如燀不有靜者心茲懷曷由展念君守幽素閉跡同偃蹇塵榻鳥字頻閒忩晝絲罥誰開蔣生徑獨契子雲館何時風雨來一洗煩慮逭龍江阻風寄同院諸公客心疾如飛咫尺隔大江長風夜半生濁浪曉來降戀闕情豈緩望鄉思彌切且呼一斗酒坐待艫頭月艫頭月漸明抽簪散長纓潮生揚子白山出石頭青却念携手好如何寫懷抱明發烟際帆萋萋但芳草宿釣臺髙堂薄層霄仰視烟霞深羊裘昔何為遺身在雲林漢宫久荒凉霸業成古今飄飄釣臺絲尚爾清煩襟幾年倦羇旅扁舟宿溪濱折芳欲有酬灑酒絃素琴臨流恍中夜霄漢星光沉過武夷約遊不果武夷為閩望山余十年三過其下期一遊而屢以事阻世傳蓬萊方丈去人間不逺顧非有仙風道骨者莫得而至焉是則茲山之靈異豫輒將以塵跡混之宜其回巒返嶂却我於風塵之表因賦此詩尚俟後遊果於何日扁舟下溪口薄暮煙沉沉羣峰暝色厚九曲寒流深不見幔亭君徒懷笙鶴音雲霞結飛夢風雨生平林半生慕山名十年阻登臨長懸紫宫戀未遂滄溟心豈伊真仙源避我岩跡侵回橈發長嘯起坐鳴吾琴宿分水關凌晨起芻秣驅馬白雲間倒窺猿鶴岑薄暮宿層關關門閉古色落日鳴哀湍我行倦前征憩息天風寒下臨羣壑隂仰視星宇寬攬衣不成寐脫劔膝上彈劍歌有餘情豈為行路難題吳山伍子胥廟朝驅下越坂夕飲當吳門停車訪古跡靄靄林烟昏青山海上來勢若游龍奔星臨斗牛域氣與東南吞九折排怒濤壯哉天地根落日見海色長風捲浮雲山椒戴遺祠興廢今猶存殘香弔水客倒樹哀清猿我來久沉抱重此英烈魂吁嗟屬鏤鋒冥爾國士存峨峨姑蘇臺榛棘曉露繁深居麋鹿遊此事誰能論因之毛髮豎落葉秋紛紛登金山寺江近海勢鬭中流孤島分化城若浮出鐘棾空中聞真僧何方來於茲巢白雲魚龍護法界日月棲山門而我泛梗蹤偶因滌囂紛真源杳莫測積氣長氤氲一灑甘露言便覺蘇焦焚棲身恍圓鏡永絶諸漏音發龍江和同官王洪之作時使節之長沙朝發龍河津駕言適南楚顧茲念王程臨流不遑處是時長風來遙空霽疏雨羣山坐滅沒千里但延佇豈不懷友生幸此息辛苦歸命諒有期毋為惜乖阻舟中望匡廬茲山東南美植立雲霞中九疊縈秀色萬古青茸茸我懷志靈竒絓帆喜相逢林端望飛瀑天際數雲峰香爐紫烟滅玉鏡澄湖空飛醉落巾袖毛髮梳天風顧此逐行役無由訪仙蹤長詠逺公傳坐憶東林鐘登黃鶴樓迢迢江上樓飛構梯層穹黃鶴何年來結巢白雲中仙人整羽蓋一往無遺蹤瑶笙紫河車瀟灑餘天風至今啓重關呵守虎豹雄雕簷敞白日䦨檻標晴虹我因駐旄節登攀興何窮神行萬物表目送雙飛鴻依依烟際帆逺落三湘東霜清楚天碧樹盡荆門空長辭愧禰生髙興懷庾公落日下樓去烟水青濛濛望衡嶽絓席湘水上始觀祝融峯何人奠炎服植此金芙蓉下窺俯南極仰攀接層穹昻昻五峰尊同立元氣中隂晴變氣候衆壑應寡同緣蘿石磊磊噴壑泉濛濛遙灑洞庭雪五月飛凉風伊昔禮明禋望秩猶三公靈湫出雲雨有禱無不通離明舞朱雀星紀専化工而我契冥漠覽眺殊未窮火黎記昔冢圮剝今無蹤營丘祕真圖孤魂竟誰從浮雲鳥道沒白日長天空惟應弔虞舜一嘯蒼梧東游浯溪録呈陳司馬及同登諸公客舟曉探竒興落浯水上搴蘿豁逺目所志窮異狀是時天宇晴物象自清曠烟開楚山斷千里彌一望遐延極覽眺近厯飽搜訪層崕劃中開峭壁摩萬丈顏公英烈姿元叟士林仗文辭金石奏字畫蛟龍壯伊余抗塵容所志在清賞孤雲寄微蹤獨鶴引空杖豈無千載懷亦有髙山仰同遊二三侣相與情頗暢芳蘭薦山庖林瀑灑竹帳醉揮紫霞觴亂落白雲唱歸舟漫容與潭月吐雲嶂幽興任時違心遠覺神王但云諧斯遊何以答清貺全州道中夾道松柏千株前守章復所植全南走百里碧澗緣幽岑躋險屢得勝曠望清煩襟道傍菀菀松誰氏甘棠隂聞有章大夫昔年兹撫臨政循俗云變世逺澤尚深顧茲千植繁蓊沃猶至今天長日色薄風靜雲滿林我行念徒侣苦被名跡侵畏影且息䕃避喧聊洗心據牀久兀傲思奏丘中琴知音何寥哉猿鶴空哀吟南海登粵王臺載酒豁清眺嘯歌粵臺巔粵臺久寂寞海色空蒼然荒城南斗外碧草春風前雲木隱暝色落日哀啼鵑緬懷全盛日萬里恢疆躔疏封赤社大列雉南溟専茲臺一何髙俯視如控弦運化神物改代往陵谷遷千金買辨士古瓦空寒煙惟有山僧來此地開梵筵諷唄發深夜鐘鼓羅諸天觀物理則如倐往猶千年誰將峴山淚為灑南雲邊南海郡庠宴集書贈董郡博髙堂輟絃誦秩秩敷賓筵朋來何雍容對此方穆然勸酢禮有加陟降容無偏芳蘭發中座品物羅庶籩是時海雨至須臾遍南天夏日如凉秋清風灑軒懸酣情久已暢秉德良益䖍用言賦茲什以代伐木篇龍州道中微生易為役逺節恆自持夙興戒前征萬里投南陲迢迢古龍州山猺雜羣夷浮雲翳兩曜衆壑昏隂扉由茲望明都尚隔天一涯淹留暫停騎促刺心不怡所愧子桑户中林人見稀交趾贈節鎮黃司空補衮美周甫分嶽咨堯牧晤言懷古人于茲緬芳躅圭璋信偉器麟鳯豈凡族天南一星明萬里欣共矚朅來炎海濱莫拓古輿服懷柔心為勤撫馭令尤肅政淳回澆漓仁逺起頽伏鯨濤安中流鳥語變華俗頓令天地春浩蕩被隂谷伊余慕光華幸此近膏沃衆中覩節鉞丰采朗如玉天狼晝已墮神珠夜當復願言歌德音吉頌愧清穆交州病中喜林伯正大參歸孤館抱餘瘵殊方積沉憂况茲風雨交薄暮來颼颼中夜夢九遷上國魂獨遊豈無同心人曠望阻林丘驅馳王事勤未得休戈矛旦坐念暌違此㑹良悠悠忽聞擁前髦載見回輕輈欣遂懷如開晤言疾徐瘳須臾笳鼓悲耿耿星漢流餘情寄長劔激烈何能休出雞陵關手麾白羽箑凌晨出夷關夷關春始開行旅多歡顏笑掬青澗流為洗瘴癘殘浮雲引征佩共結輕隂還前登忘險疲慿髙眺林巒却憶征南暮溟濛海霧間宿烏岩灘扁舟宿層灘灘漲夜來雨飄颻逺客情寂厯榜人語登途畏虎跡突瀨逢鱷怒東山尚沉冥推篷幾延佇蒼梧道中驅車九疑道獨鳥東南飛看山不覺逺秋雲生我衣深谷走羣籟半岑明夕暉中林有蘭茝薄暮空芳菲道上觀别者完山有鳴鳥其聲一何哀死别徒已矣生離當告誰聖人出應期玉燭耀九垓三殤無怨苛四表罔不諧爾行獨何之萬里觸炎埃五嶺表異服更邈天一涯毒蜧噆人肌瘴露冒草萊荷戈方前馳夙夜敢怠哉去去逐行侣悠悠念中懷心存長相思身沒淪死灰願同六月志倚輪為徘徊落日雲始暝長嘯悲風來曲江謁張文獻祠停舟曲江滸願言謁遺祠巖巖始興公遺澤芬在斯堂傾風雨萃碑斷苔蘚滋芳春奠行旅落日歸文貍唐宫昔全盛衡鑒方獨持弼諧展嘉猷讜論非詭隨雍雍朝陽鳯粲粲補衮絲側聞卧病後九廟烟塵飛漁陽突騎來中華混羣夷信知砥柱功用舍同安危昭陵鐵馬空仙李祚久移維餘蘭菊存千秋恆若茲我來薦微誠再拜當前墀顧瞻廟貌間風度猶可希武溪何淫淫蓉峰亦巍巍只今相業隆孰與前修期臨風一長嘆山雨來霏霏過清逺峽兩山夾飛流曲折始東走排空殷崩雷出峽去愈驟商人數畏津漁子駭奔溜回瀾乍窺淵迸瀨亂泄竇上當羣石爭下及衆川潄勢齊龍門險雄長碣石右惜哉神禹功奠畫逺莫究遂令五嶺南别與萬靈鬭我行一停舟適值風雨候崩騰心為徨滉漾目已瞀篙師戒前征薄暮不敢逗開蓬訝驚湍宛若羣鷺簉乃知造化神茲實亘宇宙三復忠信言呼酒聊獨侑過道源書院謁濓溪祠百家騁異說聖道汨其真運極理必反光嶽生斯人手探闔闢樞示我動靜根絶緒既有授再見宣人文二賢韡華萼中州儀鳯麟遂開濓洛流逺接洙泗津大哉作聖功疊疊光後塵我昔披圖書玩讀忘苦辛微言冀可㑹弱質慙弗振况經講道邦仰止希先民其如覩光霽衆草閒庭春晨興䇿我馬遲暮膏吾輪逸軌尚可駕敢云替斯勤舟移豫章髙士亭址下寄新喻文學潘時彥雲水極杳靄一櫂東南歸青林相掩映白鳥烟中飛新蒲乍隱舟漫流侵夕磯偶尋髙士宅忽悵故人違搖曳鳴玉琴誰云出處非明發引前望五老收隂霏送林大全赴天台縣幕枳棘宿鸞鳯百里淹驊騮郎官古猶薄况秉帷幄籌君如紅蓮花艷色閒且幽芳馨當自揚豈值濁水流紉蘭世方敦服艾衆所羞匪無太華仙置爾玉井頭去去但自保毋以增煩憂幽中送張用剛還晉安海水天際落北風捲蓬根愁烟結逺思薄暮空紛紛京洛子不留驅車出都門離筵楓葉下客路逺聲聞借問此日還何時鷗鷺羣舟移九曲棹樹隱重關雲笑我鸞鶴姿久閉樊籠春烟霞有歸夢為爾飛吟魂七言古詩前有尊酒行前有尊酒我為君夀有瑟在筵有螯在手青年既阻白髮被首於今不樂古人奚有自昔有言俟河之清人夀幾何云胡不醉起舞傞傞側辨以俄弗鼓缶而歌恐大耋之蹉跎秋露如玉下被庭緑良夜未央胡不秉燭東陵死利西山死名莊周放達禹稷躬耕吾誠何暇以論此前有尊酒君須傾長歌行有淚莫泣鮫人珠有足莫獻荆山玉赤心徒使按劔猜至寶翻令笑魚目千金蹈海稱達人五噫出關西去秦負芻不復遇知已空歌白石南山春楚卿棄相復何有於陵甘作灌園叟雜縣偶集魯東門惆悵胡能事杯酒長風蕭騷百草殘長鋏悲歌涕汍瀾金臺駿骨久已化瑶水風波不可攀畏途羊腸能折軸緘書為謝雲間鵠海上三花久負期醉歸漫託平原宿將進酒故人手持金屈巵進酒與君君莫辭仲孺不援同産服孟公肯顧尚書期當歌激風和結楚吳姫白苧莫停舞黃河東走不復回白日經天豈能駐田文昔日盛經過朝酣暮樂艷綺羅髙臺已傾曲池廢祇今誰聽雍門歌我有一曲側君耳世事悠悠每如此子雲浪作投閣人賈生空弔湘江水春風南園花滿枝莫待秋風搖落時東山笑起徒為爾乘時莫負髙陽池古别離將軍嫖姚北伐時漢兵五道同出師使者三河募豪傑材官半是幽并兒鴈門燕郊一丈雪交河蹴踏層氷裂鳥斾遙翻青海雲蛇弓亂射隂山月青海隂山若箇邊芳閨桃李為誰妍三年玉筯頻啼處萬里金鉦尚未旋機中錦字織成久漫訴相思别離後鴛被春來夜夢多龍沙秋盡寒川走飛書昨夜入咸陽詔更徵兵屯朔方苦戰胸奴圍未解鐡衣著盡邊庭霜邊庭風霜那可度望斷關山不知處衣冠詎惜鸞帶賖樓髙枉盼鴻音暮自古封侯燕頷身肯思中婦鳯樓塵但令疏勒風烟掃井作陽臺雲雨人怨歌行絃奏鈞天素娥之寶瑟醉傾紫霞碧海之瓊杯宿居七采流蘇之錦帳坐我九成白玉之髙臺臺髙帳暖春雲薄金縷輕身掌中托結成比翼天上期不羡連枝世間樂嵗嵗年年樂未涯鴉黃粉白淡相宜卷衣羞比秦王女抱衾肯賦宵征詩參差雙鳯裁筠管誰信韶華有凋換魏園未泣龍陽魚漢宫忍聽長門雁長門蕭蕭秋影稀粉屏珠綴流螢飛苔生舞席塵䝉鏡空傍閒階尋履綦宛宛青陽日將暮惆悵君恩棄中路妾心如月君不知斜倚雲和雙淚埀行路難倚劔且勿嘆聽我行路難世途反覆多波瀾焦原九折未為艱君不見漢謡斗粟歌未闌長門一夕秋草殘骨肉之恩尚如此何况他人方寸間又不見綘侯身榮應繫獄賈生終對長沙鵩功成更覺小吏尊才髙寧避明時逐所以赤松子逺赴中林期誰能吳江上見笑鴟夷皮驪龍有珠在滄海勸君逆鱗勿嬰之子推介山下屈原湘江湄當時枘鑿自不量至今憔悴令人悲行路難難為言滄海一棹且歸去長安大道橫青天少年行千金換寶劍短髮鬘長纓銀鞍照紫燕颯沓洛陽城洛陽城中足年少陌上相逢開口笑按鋏長歌猛虎詞彎弓直上呼鷹道歸來買笑何所歡白日擁擲夜未闌百觴每共孫賓醉一飯羞從漂毋餐吳姫二八小埀手短笛橫吹折楊桞一曲臨風意氣生珊瑚擊碎亂從橫春來秋去只如此五侯七貴為知己却笑侯嬴空抱關白首夷門不暫閒短歌行東風吹花墮錦筵楊桞半軃青樓烟主人自為鴝鵒舞小妓更奏鴛鴦絃當杯入手君不醉落日已在西山巔短歌一拍心茫然請看明鏡髙臺上何須白髮悲芳年逺遊曲蟭螟棲蚊睫鯤鵬運天淵看來小大各有適人生出處同所然蘇秦未佩六國印一身落魄誰相問相如去蜀謁武皇髙車四馬生輝光以兹感慨慕昔人起秣吾車膏吾輪出門仰天發長笑寧辭斷梗隨風塵朝趨楓陛謁明主夕掌蘭臺作貴臣自謂半生有竒遇從閒因獻甘泉賦雕蟲小技何足誇白日天光屢回顧朝回敕賜飛龍駒玉勒光輝驕道隅雕筵象几進綺食不但醉飽同侏儒君不見漢家主父寧久貧買臣無復恆負薪當時妻子笑相薄一朝四海來相親閔生寂寞困藜莠榮期憔悴䝉埃塵請君試聽逺遊曲何必長為畎畝民塞下曲君不見鴈門九月風如刀筋强蹄健騰天驕邊庭列障走烽燧旄頭夜出天山髙隂磧茫茫走千里刁斗聲沉塞雲紫重圍未破殺氣昏萬衆同呼士心死起看壯士皆裹創援桴鼓之氣益張三軍奮迅一敵萬戰龍血染天為黃自此胸奴知姓字漢家盡雪穹廬恥可憐白首未封侯一片雄心向誰是君馬黃君馬黃我馬白二馬同嘶出南陌南陌東阡夾濁橋馬行平地似青霄羈金絡月人皆羡振玉鳴珂意自驕朝出相隨暮相逐可憐人馬皆如玉如何與君生别離君馬東行我馬西欲知後夜長鳴處羞對駑駘一萬蹄長相思長相思乃在瀛洲之上碧海之涯閬風蓬壺相蔽虧琅玕碧草何離離安期偓佺空有期五龍起舞鸑鷟隨祥風化日同熙怡碧桃紅杏春滿枝鸞驂鶴馭同遨嬉我獨何為困羈離弱水三萬不可飛長相思心為悲醉歌行畣鄭五迪人生三十古所立嗟余落拓竟何有眼中萬事皆等閒帳下一經空自守揚雄寂寞人皆羡長卿憔悴誰相偶五陵西上事已非百粵南歸嵗應久侯門無分曳長裾别墅閒來閉虛牖感懷徒使壯士悲託交何處論新舊與君一見即傾倒握手相歡情頗厚意氣能凌豪士前風流肯落當時後每於結客散黃金縱令負郭無百畝白社吟來落木秋青山醉倒芳尊酒知己終憐水上萍年光暗擲門前桞惟有長歌一片心此日贈君君識否紈扇歌贈别張秀才手把白紈扇贈君表深情諸君試揮揚座上仁風生紈扇團團似明月不比君心圓復缺聊將霜雪比貞素那謂炎凉有離别念爾相携似故人氷壺玉樹宛相親草聖從經內史筆西風漫障元規塵憶當長信深幽地曽對佳人掩雙淚此日臨岐一送君莫學秋來便相棄贈吳六少年結客遊五陵布衣落魄喜談兵是時氐羌殺主將邊庭一夕烟塵生當筵意氣許君死飲血報仇為知己一生猿臂挽兩弧三尺魚腸走千里窮秋絶漠羽書飛輕身陷陳解重圍眼看旄頭關塞落手持讐首轅門歸帳下三杯躍紫燕衆中萬嵗瞻白衣功成幕府失姓字扁舟歸釣滄江湄爾來時平復何有萬事磋跎付杯酒昔年蓮鍔吐星鋩今日茅茨閉虛牖大夫感激驚心魂平原食客有誰存臨風夜夜弔孤月長歌擊筑聲俱吞閒來遇我何所為未言往事先凄其鬢毛零落已如此心跡悠悠誰復知送陳熚池上百草緑春城黃鳥吟玉壺清酒與君别青山去後空雲林問君此行何慷慨一嘯揚眉起滄海須使功名及早成莫教緑鬢流年改拂劔酣歌四座傾共看仙籍快登瀛上林奏賦久相待宣室求賢方未寧縱醉臨岐不知晚落渚蕭蕭送歸鴈别路雲程兩地分目極烟江去帆逺寄答黃伯亨我馬從東來君車正西去有似風吹海上雲天際無心忽相遇與君相遇即相知瀝膽輸肝無復疑虞卿豈顧雙白璧平原輕擲二美姬狂歌一斗酒共醉六屏月拂曙登古臺慷慨與君别君行五嶺南我阻三山道何處我思君天涯但芳草昨朝鴻鴈下烟江銜得君書置我前開緘拂冰雪千里情灑然念昔與君多意氣相期豈作桃李妍鬷生立堂下叔向知其賢袁𢎞發朗詠謝公遂回船丈夫一語茍有合何必結交窮嵗年我有古干將鏽澀久棄捐寧甘困泥滓恥為兒女憐君有長歌向余寫我將古調為君宣月明洞口鳴風泉清商一曲付哀絃雲山麋鹿可為侣紛紛薄俗何其偏贈李道士大朴已散𤣥風澆函關紫氣騰赤霄邇來蓬壺幾清淺孫枝秀出何飄飄君從胡來載雲軺仙裾搖曳凌晨朝紫皇天上吹碧簫左揖羡門右松喬東祈若華夀西母麻姑緑鬢顔未凋有時馭列缺攜招搖俯降昆吾丘飲我長生瓢霓為鈴兮風為馬白日羽翰何翛翛吾將挈日月以觀乎無始與夫子兮遊遨西亭夜送林六敏還山今夜西亭月秋風梧葉凉故人發孤興别夢繞林塘浮世相逢心草草羡君拂衣一何早百畝風泉繞桂枝歸去南山跡如掃南山松桂北山雲飲澗穿雲麋鹿羣窗間明月但髙枕洞口飛泉長對門知君自是悠悠者何須叩角歌長夜鄭谷年來秋草稀鹿門誰伴白雲歸君行好覔赤松子余亦將紉薜荔衣送吳生赴閩中吳生落魄志不羈世上悠悠那復知長希一代賢豪士不學千金遊俠兒三十窮經坐環堵四壁蕭條但榛莽客路偏驚季子裘故人誰薦揚雄賦酣歌擊筑不堪聞中宵起舞思紛紛功名且付杯中酒富貴從輕天上雲平生髙懷有如此青眼論交見生死俗流未足論升沉丈夫應須有知己茲行逺遊何時還西窺太華浮雲間也知局促蓬蒿底終然莫掩冲霄翰宿桃溪方翁家贈别清溪一帶緣桃花春來水上流胡麻東風尋源泛瑶棹雲中逺見山人家於茲水木相含景裊裊松杉亂天影少焉林壑衆籟鳴巾舄飛來片雲冷二三老翁住東陂薜衣霜雪埀兩眉自言入山嵗已久不知人世今何時傳聞有客驚還喜共薦清泉飯松子烟林霧篠不逢人碧草苔花應滿地問余何事在塵間那似山中日月閒澗户聊同魚鳥醉石牀常伴雲霞眠乍逢靈境真堪悅區緣未謝還成别别後重來定幾時夢繞溪邊緑蘿月題深溪草堂草堂住在深溪裡四面窗開玩清泚空翠長浮半壁隂凉颷時傍虛簾起雲收月墮吟幌明雨過苔侵釣磯紫心閒野鳥自忘機客至談𤣥聊隱几髙情淡蕩付琴尊有時落魄不冠履已知人境得蓬丘恍若漁舟問桃水滄洲有約在投竿白首何心懷帝里祗今方憐世態薄逢君况值丘壑美荷衣蕙帶或可紉也向溪頭拾芳芷聽琴歌送方氏逸民歸天台嶧陽孤桐節風雨月中雙鳯幽修語一辭㸑下登髙堂徽向黃金思何苦初彈一曲南風生端拱埀衣虞舜庭悄然再鼓神欲往美人頎而結遐想須臾改調絃亂鳴引宫刻角流新聲泛如陽春激白雪淡如緑水涵秋清羡君操成有如此十指游心在千古户外翩翩鸞鶴翔松下傞傞鬼神舞世間箏徒紛紛可憐此調誰能聞江湖寥寥少知己抱歸獨卧空山雲送友還劔上手把一尊酒送君白下門秋風官道傍落葉何紛紛念我辭家久為客京華一日幾人别茲晨慷慨復送君令人却憶故山雲君家舊在劍溪上門外雙峰宛相向雲屏九曲倚醉過青山别後近如何君行漫浪不須久舊業荒凉風雨後㑹豫得買南山航蘿徑苔磯一相候賦得郎官湖送蕭長史郎官不見今已久平湖誰泛郎官酒芳尊空負東園花落日長懸漢城柳送君扁舟湖上過荆雲郢樹勝槩多微風十里留孤櫂細雨三湘送晚波謫仙祠古何寥寞郎官佳句誰繼作羡君雅調希昔賢湖中早望寄來篇賦得釣龍臺送友人還閩九原鹿迹何茫茫五星東井熙炎光無諸功成裂漢土組練三千還故鄉當時築臺青冥中閒來埀釣滄江龍屠龍技成去不返至今百粵山河空臺外蒼山落平楚臺下江流自今古野水荒烟古戍寒落日精靈尚來去過客慿髙眺逺鴻可憐何處聽歌鍾愁雲偏結謝端渚海月長懸薛老峰故人舊隱螺江側曽共吟秋弔陳迹此日南歸興不窮别後登臺好相憶劍潭歌送董大令還晉江兩山何來勢峥嶸山下碧潭秋水清昔人寶劍化神物至今白日風雷爭送君南行感疇昔秋深擁棹蛟龍窟醉起登艫牛斗爛夜凉擊汰精靈出千里寒流赴海深宦游同到海天溟明朝霄漢還相㑹未必牛刀嘆陸沉賦得龍江送蕭御史君不見龍江水流東到海天塹由來知幾代三月春潮繞帝城噴雪鳴濤走澎湃往事流殘落照中六朝遺迹恨無窮清時不用限南北萬國梯航此日通烟開目極澄波渺海門一㸃孤帆小勢吞九派落雲間雄浸三山出天表江上潮來一送君中流宛見繡衣新青年好遂澄清志莫羡當時擊楫人送陳將軍還鎮三河紫髯將軍身七尺早拜金吾未三十臂挽雕弧二石强腰橫寶劍千人敵曽隨驃騎過祁連論賞平蕃功最先直向交河馳羽檄肯教烽燧照甘泉名髙飛將傳異域氣凌屬國雄燕然百年思刷㑹稽恥萬里曽屯充國田邇來移鎮三河久馬上黃金埀紫綬偏禆皆為六郡英賢豪不數雲中守平原草色獵騎還鴈門雪盡春歸後邏靜無傳紫塞烟客來但醉芳尊酒良時躍馬獨朝天闕下相逢思藹然久知公子能虛左苦憶將軍恆在邊錦帶紅纓士如虎明日都門仍出祖節鉞翩翩不見君惟見雲臺天尺五送楊世顯還溫陵兼寄胡郡守童將軍八月江南鴻雁翔蒹葭夕露凝如霜典衣沽酒不成醉遊子此時思故鄉故鄉别來在何許秋風吹落桐花樹歸夢長懸嶺嶠雲客衣久翳秦淮雨以茲慷慨賦式微都門祖帳送斜暉舟從揚子江頭發路指嚴陵灘下歸壺公片月生滄海紫帽嵐光拂翠微溫陵太守蘭臺客往日詞林見顔色虎頭將軍懸轆轤金尊為爾酒剩沽到時相見即傾倒為我問訊今何如贈遼陽僧慧峰上人出家絶世緣少小入山今幾年悟得真空無住著手探濁海神珠圓草衣百結幽巖裡晝拾松花飲泉水野性無心狎澗麋大法時談聽山鬼遼海蒼蒼接逺天居人漁獵厭腥膻山中有僧誰解識長日安禪祇晏眠此生自笑機緣薄欲接微言解羣縛昨夜中峰禮白雲唯見諸天寶花落古劍行贈周辰殺氣貫斗牛精光何陸離風胡不可遇千載令人悲憶昔干將初鑄日五夜龍池飛霹靂秋水芒寒鸊鵜膏虹光鍔吐蓮花質當年曽聞易水歌荆卿不濟當如何從來相隨赤帝子颯颯秋郊泣嫠鬼乃知神物用有時風雲變化誰能知祗今蕭條鐔水上白日往往蛟龍飛俠客相看魂欲死一片雄心許知己别來夜夜匣裡鳴憶君清淚如鉛水為君摩挲君試看劍歌有曲君莫彈從來烈士皆如此茫茫萬古悲風寒騶虞歌玉壺漏咽銅龍曉香暖蓬萊百花繞閶闔平臨寶仗催千官跪進騶虞表慶世騶虞此日生普天率土頌升平般般文采樂君囿濟濟威儀叶聖徵周詩自昔歌忠厚此物由來世稀有五龍八駿詎能追紫鳯祥麟本同友南薰方理朱絲絃莵昌懸精光麗天瑶編綵毫瑞青史吁嗟騶虞古無比東湖春意圖為樵門李姚生題鴛鴦湖上春風軟栁絲無力桃㾗淺暖烟籠碧水如雲纎纎細草苔香滿滿樓罨畫大堤傍羅綺晴嬌緑錦鄉氷絃玉柱新調吕半蹙雙蛾倚淡粧鸂鶒雙雙㸃晴霧百勞東飛燕西去紫泥誰染天上春雲緘留得相思句日暮相思枉斷腸緑波千里共悠揚龜甲屏風花夢曉一抹修蛾鏡中小王芾家詠梅花燈并娥剪素鏤秋水蘭焰傳春破瑶蕊粉屏射蠟搖珠光的厯氷魂廣寒裡嚴城畫角聲咿咿羲馭漸軋搏桑枝芳心暗逐烟燼落玉鳬咮冷沉烟薄紫芝山房歌為鄭尚書賦我昔慕幽賞山水縱竒觀朝揮海客棹暮宿山霞關武夷羣峰白雲端幔亭玉女非人間層巒叠嶂去何極空際軒翥如騰鸞雙溪夾出繞明鏡百步九折鳴飛湍就中紫芝一峰峭恍惚溪上凝烟鬟深林瑶草晝可拾山人笙鶴無時閒紫芝之山不可攀須知聖世非商顔祇應吐祥産竒瑞煌煌三秀被林巒何人卜居此山下康成子孫世文雅朵朵芙蓉鏡底青淙淙瀑布屏間瀉山寂寂兮山房幽蘭膏烟帳夜埋頭經史縱橫一萬卷天地上下三千秋閒尋方外屐笑掬澗底流採芳結瑶佩濯足歌逺遊蒼生海內望安石謝公不得東山留一朝束書謝丘壑嘯咤風雷起寥廓石牀松月為誰明清夜徒聞弔猿鶴南宫作賦安足竒大廷對䇿禆衮衣才髙萬乘屢回顧承明出入生光輝玉驄曽錫天間騎節鉞重煩大藩寄小吏蘭臺識馬周居人渤海懷龔遂勝槩相看無處無烟蘿不似故園居瞻雲幾動親闈念歸思空因託鯉魚爾來中朝屬耆舊廊廟端嚴軃章綬廷尉人傳天下平秩宗名在當時右當時之名信可稱回望故山山更青晉公緑野久寂寞白傅匡廬未足榮秖今八荒歌太平三台位列中天明功成早晚拂衣去仙舟九曲能相迎此時君當倒却建溪緑我亦為君歌一曲何必相携茹紫芝四海清風緬髙躅雙桂堂為彭進士汝器賦君家庭前雙桂枝翠芳金粟枝離離塵世豈同凡木比雲間自有天香吹人言此種蟾宫得曽映清光滿仙陌移植君家今幾年日日開簾玩芳色請看雙桂共青青五桞三槐漫獨榮月中鸞鳯交加影風裏虬龍答和聲更愛君家好兄弟早歲香名折仙桂君不見庭前此樹根不移直上凌雲日相對薜蘿山房歌為新寧王錫賦陶公栁莊蕭索久蔣生竹徑開何有何似君家隱處偏開門蘿薜向人懸蘿薜蒼蒼送晚凉縈烟絡月繞林塘鳥啼密葉籠書愰客去飛花滿石牀寒侵細蔓秋仍薄飲覆春泉香濯濯夜深惟恐蛟龍爭幽處無論鬼神託我憶山房昔訪君繁烟裊裊更紛紛别後山衣夢中冷何日重紉蘿薜雲林間泉石題名久澗畔莓苔藉醉頻緘藤為報故人意瑶琴一曲山房春凌歊臺懷古臺在黃山巔宋太祖離宫朝發石頭渚暮宿黃山道携酒眺古臺離離但烟草憶昔茲臺何壯哉宋祖離宫臺上開臺前寶樹入層漢臺下炎歊隘九垓楚山望盡蜀山出雄跨全吳勢凌突欲吞銅雀俯中原不數黃金貴竒骨三千歌舞宿雲端公子王孫往復還秦關捷書不再返鼎湖飛龍誰復攀繁華一旦乃如此寂寂荒臺秋色裡往事徒悲禾黍場殘碑半墮滄江水滄江水流去不回空陵劫火變寒灰欲將霸業問行客黃山落日清猿哀蒼梧與鄒郎中别五兩絓飛雨夜宿蒼梧隂蒼梧烟水正愁絶江上誰歌離别吟與爾别離何草草百壺且盡開懷抱霜鱠紅鱗入座鮮錦荔堆盤出林早醉起長歌一慨然客中况是客中憐明朝海上能相憶只有青天片月懸藤江别思為徐枝文題秋風泛鷁凌寒渚繞座鳴鵾促飛雨羽觴爭勸不須停醉發蒼梧下湓浦三年綘帳淑青襟此日臨岐識爾心為問藤江汪汪水别意與之誰淺深虛舟集卷三
